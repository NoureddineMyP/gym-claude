<!DOCTYPE html>
<html lang="it" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>PPL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --push: #FF2D00;
      --pull: #00F070;
      --legs: #FFB400;
      --acc: #4D7CFF;
      --push-dim: rgba(255, 45, 0, .12);
      --pull-dim: rgba(0, 240, 112, .1);
      --legs-dim: rgba(255, 180, 0, .1);
      --r: 12px;
      --rl: 18px;
    }

    [data-theme="dark"] {
      --bg: #0C0C0C;
      --s1: #161616;
      --s2: #202020;
      --s3: #2A2A2A;
      --s4: #363636;
      --ln: rgba(255, 255, 255, .06);
      --ln2: rgba(255, 255, 255, .11);
      --fg: #EDEAE2;
      --fg2: #888480;
      --fg3: #444;
      --card-bg: #161616;
    }

    [data-theme="light"] {
      --bg: #EDEBE5;
      --s1: #E3E0D8;
      --s2: #D8D4CB;
      --s3: #CBC7BC;
      --s4: #BFBBB0;
      --ln: rgba(0, 0, 0, .07);
      --ln2: rgba(0, 0, 0, .13);
      --fg: #1C1A17;
      --fg2: #6A6760;
      --fg3: #AAA7A0;
      --card-bg: #E3E0D8;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html {
      font-size: 16px
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background .2s, color .2s;
      -webkit-font-smoothing: antialiased;
    }

    input[type=number] {
      -moz-appearance: textfield
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none
    }

    button {
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      background: none
    }

    ::-webkit-scrollbar {
      width: 2px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ln2);
      border-radius: 2px
    }

    .bb {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: .03em
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--ln);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: .05em;
      line-height: 1
    }

    .logo .dot {
      color: var(--push)
    }

    .topbar-r {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--s2);
      border: 1px solid var(--ln);
      border-radius: 99px;
      padding: 5px 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .04em;
    }

    .theme-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--s2);
      border: 1px solid var(--ln2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: background .15s;
    }

    .theme-btn:hover {
      background: var(--s3)
    }

    .bnav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--s1);
      border-top: 1px solid var(--ln);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding-bottom: env(safe-area-inset-bottom, 0);
      z-index: 50;
    }

    .bni {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 10px 6px 9px;
      color: var(--fg3);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: .08em;
      transition: color .15s;
    }

    .bni svg {
      width: 21px;
      height: 21px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .bni.on {
      color: var(--fg)
    }

    .nav-indicator {
      position: absolute;
      top: 0;
      height: 2px;
      border-radius: 0 0 3px 3px;
      background: var(--push);
      transition: left .25s cubic-bezier(.4, 0, .2, 1), width .25s cubic-bezier(.4, 0, .2, 1);
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(62px + env(safe-area-inset-bottom, 0))
    }

    .pg {
      display: none;
      padding: 18px 16px 8px
    }

    .pg.on {
      display: block
    }

    .fadein {
      animation: fi .2s ease both
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .ph {
      margin-bottom: 20px
    }

    .ph-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: .02em;
      line-height: 1
    }

    .ph-sub {
      font-size: 13px;
      color: var(--fg2);
      margin-top: 3px
    }

    .sess-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 16px
    }

    .sess-tab {
      padding: 11px 4px;
      border-radius: 10px;
      border: 1.5px solid var(--ln);
      background: var(--s1);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: .06em;
      color: var(--fg2);
      transition: all .18s;
    }

    .sess-tab.ap {
      background: var(--push);
      border-color: var(--push);
      color: #fff
    }

    .sess-tab.al {
      background: var(--pull);
      border-color: var(--pull);
      color: #000
    }

    .sess-tab.ag {
      background: var(--legs);
      border-color: var(--legs);
      color: #000
    }

    .hero {
      border-radius: var(--rl);
      padding: 22px 20px 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, currentColor 0, currentColor .5px, transparent 0, transparent 8px);
      opacity: .06;
      pointer-events: none;
    }

    .hero-push {
      background: linear-gradient(135deg, #1a0800, #2a0e00);
      border: 1px solid rgba(255, 45, 0, .2);
      color: var(--push)
    }

    .hero-pull {
      background: linear-gradient(135deg, #001508, #002712);
      border: 1px solid rgba(0, 240, 112, .15);
      color: var(--pull)
    }

    .hero-legs {
      background: linear-gradient(135deg, #161000, #251c00);
      border: 1px solid rgba(255, 180, 0, .15);
      color: var(--legs)
    }

    .hero-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px
    }

    .hero-tag {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: .12em;
      border: 1.5px solid currentColor;
      border-radius: 5px;
      padding: 3px 8px;
      opacity: .8;
    }

    .hero-count {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, .4)
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: .01em;
      line-height: 1;
      color: #fff;
      margin-bottom: 14px
    }

    .pbar-row {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .pbar-track {
      flex: 1;
      height: 3px;
      background: rgba(255, 255, 255, .1);
      border-radius: 2px
    }

    .pbar-fill {
      height: 3px;
      border-radius: 2px;
      background: currentColor;
      transition: width .4s ease
    }

    .pbar-pct {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px
    }

    .timer-box {
      background: var(--s1);
      border: 1px solid var(--ln);
      border-radius: var(--rl);
      padding: 16px;
      margin-bottom: 12px;
    }

    .timer-row {
      display: flex;
      align-items: center;
      gap: 12px
    }

    .timer-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: -.01em;
      line-height: 1;
      min-width: 110px;
      transition: color .2s;
    }

    .timer-num.go {
      color: var(--pull)
    }

    .timer-num.pause {
      color: var(--legs)
    }

    .timer-ctrls {
      display: flex;
      gap: 6px;
      flex: 1
    }

    .tc {
      flex: 1;
      padding: 10px 4px;
      border-radius: 9px;
      border: 1.5px solid var(--ln);
      background: var(--s2);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      color: var(--fg);
      transition: all .15s;
    }

    .tc.start {
      background: var(--pull);
      border-color: var(--pull);
      color: #000
    }

    .tc.stp {
      color: var(--push)
    }

    .tc:hover {
      background: var(--s3)
    }

    .tc.start:hover {
      opacity: .88
    }

    .t-presets {
      display: flex;
      gap: 5px;
      margin-top: 10px
    }

    .tp {
      flex: 1;
      padding: 7px 2px;
      border-radius: 8px;
      border: 1px solid var(--ln);
      background: transparent;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: var(--fg2);
      transition: all .14s;
    }

    .tp:hover,
    .tp:active {
      background: var(--s2);
      color: var(--fg);
      border-color: var(--ln2)
    }

    .t-bar-track {
      height: 3px;
      background: var(--ln);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 10px
    }

    .t-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--pull);
      transition: width .9s linear, background .4s
    }

    .rpe-strip {
      display: flex;
      gap: 4px;
      margin-bottom: 14px
    }

    .rpe-chip {
      flex: 1;
      padding: 6px 2px;
      border-radius: 8px;
      border: 1px solid var(--ln);
      background: var(--s1);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--fg3);
      text-align: center;
    }

    .rpe-chip.t {
      background: var(--pull-dim);
      border-color: rgba(0, 240, 112, .25);
      color: var(--pull)
    }

    .rpe-chip.r {
      background: var(--push-dim);
      border-color: rgba(255, 45, 0, .2);
      color: var(--push)
    }

    .grp-hd {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 10px
    }

    .grp-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: .12em;
      color: var(--fg2);
      white-space: nowrap;
    }

    .grp-line {
      flex: 1;
      height: 1px;
      background: var(--ln)
    }

    .exc {
      background: var(--s1);
      border: 1px solid var(--ln);
      border-radius: var(--rl);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .2s, opacity .2s;
    }

    .exc:hover {
      border-color: var(--ln2)
    }

    .exc.done {
      opacity: .38
    }

    .exc.done .ex-name {
      text-decoration: line-through;
      text-decoration-color: var(--fg3)
    }

    .exc.prio-push {
      border-left: 3px solid var(--push)
    }

    .exc.prio-pull {
      border-left: 3px solid var(--pull)
    }

    .exc.prio-legs {
      border-left: 3px solid var(--legs)
    }

    .exc.new {
      border-left: 3px solid var(--acc)
    }

    .exc.up {
      border-left: 3px solid var(--legs)
    }

    .ex-top {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 14px 14px 10px
    }

    .ex-chk {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
      border: 2px solid var(--ln2);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      transition: all .2s;
    }

    .ex-chk.on {
      background: var(--pull);
      border-color: var(--pull);
      color: #000
    }

    .ex-chk svg {
      width: 13px;
      height: 13px
    }

    .ex-body {
      flex: 1;
      min-width: 0
    }

    .ex-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: .02em;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ex-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px
    }

    .tag {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px;
      letter-spacing: .08em;
      padding: 2px 8px;
      border-radius: 5px;
    }

    .tag-set {
      background: var(--s3);
      color: var(--fg2)
    }

    .tag-push {
      background: var(--push-dim);
      color: var(--push);
      border: 1px solid rgba(255, 45, 0, .2)
    }

    .tag-pull {
      background: var(--pull-dim);
      color: var(--pull);
      border: 1px solid rgba(0, 240, 112, .18)
    }

    .tag-legs {
      background: var(--legs-dim);
      color: var(--legs);
      border: 1px solid rgba(255, 180, 0, .2)
    }

    .tag-new {
      background: rgba(77, 124, 255, .14);
      color: var(--acc);
      border: 1px solid rgba(77, 124, 255, .22)
    }

    .tag-up {
      background: var(--legs-dim);
      color: var(--legs);
      border: 1px solid rgba(255, 180, 0, .2)
    }

    .ex-note {
      font-size: 12px;
      color: var(--fg2);
      margin-top: 5px;
      line-height: 1.4
    }

    .ex-orm {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: var(--acc);
      margin-top: 4px
    }

    .ex-r {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0
    }

    .kg-inp {
      width: 68px;
      background: var(--s2);
      border: 1.5px solid var(--ln);
      border-radius: 10px;
      color: var(--fg);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      text-align: center;
      padding: 7px 6px 5px;
      outline: none;
      transition: border-color .15s;
    }

    .kg-inp:focus {
      border-color: var(--ln2)
    }

    .kg-lbl {
      font-size: 10px;
      color: var(--fg3);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em
    }

    .ex-trend {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: var(--fg3)
    }

    .ex-trend.up {
      color: var(--pull)
    }

    .ex-trend.dn {
      color: var(--push)
    }

    .ex-acts {
      display: flex;
      gap: 5px;
      padding: 0 14px 12px;
      flex-wrap: wrap
    }

    .act {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--s2);
      border: 1px solid var(--ln);
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--fg2);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: .06em;
      transition: all .14s;
    }

    .act:hover,
    .act:active {
      background: var(--s3);
      color: var(--fg);
      border-color: var(--ln2)
    }

    .act svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round
    }

    .sets-panel {
      display: none;
      padding: 0 14px 14px
    }

    .sets-lbl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--fg3);
      margin-bottom: 8px
    }

    .set-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px
    }

    .set-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      color: var(--fg3);
      width: 16px;
      text-align: right;
      flex-shrink: 0
    }

    .set-kg {
      width: 56px;
      background: var(--s2);
      border: 1.5px solid var(--ln);
      border-radius: 8px;
      color: var(--fg);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      text-align: center;
      padding: 6px 4px;
      outline: none;
      transition: border-color .14s;
    }

    .set-kg:focus {
      border-color: var(--ln2)
    }

    .set-rp {
      width: 46px;
      background: var(--s2);
      border: 1.5px solid var(--ln);
      border-radius: 8px;
      color: var(--fg);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      text-align: center;
      padding: 6px 4px;
      outline: none;
      transition: border-color .14s;
    }

    .set-rp:focus {
      border-color: var(--ln2)
    }

    .set-x {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      color: var(--fg3)
    }

    .set-ok {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1.5px solid var(--ln2);
      background: transparent;
      color: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .14s;
    }

    .set-ok.on {
      background: rgba(0, 240, 112, .14);
      border-color: rgba(0, 240, 112, .35);
      color: var(--pull)
    }

    .set-ok svg {
      width: 11px;
      height: 11px
    }

    .set-add {
      background: transparent;
      border: 1px dashed var(--ln2);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--fg3);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: .06em;
      margin-top: 4px;
      transition: all .14s;
      align-self: flex-start;
    }

    .set-add:hover {
      border-color: var(--fg3);
      color: var(--fg2)
    }

    .wu-panel {
      display: none;
      padding: 0 14px 12px
    }

    .wu-inner {
      background: var(--s2);
      border-radius: 10px;
      padding: 12px
    }

    .wu-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: .1em;
      color: var(--acc);
      margin-bottom: 8px
    }

    .wu-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--fg2);
      padding: 2px 0
    }

    .wu-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--acc);
      opacity: .6;
      flex-shrink: 0
    }

    .alts-panel {
      display: none;
      border-top: 1px solid var(--ln);
      background: var(--s2);
      padding: 14px
    }

    .alts-lbl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--fg3);
      margin-bottom: 10px
    }

    .alt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--s1);
      border: 1px solid var(--ln);
      border-radius: 10px;
      padding: 11px 12px;
      margin-bottom: 6px;
      gap: 10px;
    }

    .alt-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: .02em
    }

    .alt-sub {
      font-size: 11px;
      color: var(--fg3);
      margin-top: 1px
    }

    .alt-use {
      background: var(--acc);
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: .06em;
      flex-shrink: 0;
      transition: opacity .14s;
    }

    .alt-use:hover {
      opacity: .85
    }

    .alts-close {
      font-family: 'Bebas Neue', sans-serif;

      const state = gs();
      const sess = P.sessions[pFilter];
      const allLogs = Object.values(state.logs || {}).filter(l => l.type === pFilter).sort((a, b) => a.date > b.date ? 1 : -1);
      const allEx = sess.groups.flatMap(g => g.ex);
      const col = P.colors[pFilter];
      const el = document.getElementById('pg-progress');
      let h = `<div class="ph"><div class="ph-title">PROGRESSI</div></div>`;
      h += `<div class="filter-row">`;
      [{ t: 'push', c: 'f-push' }, { t: 'pull', c: 'f-pull' }, { t: 'legs', c: 'f-legs' }].forEach(f => {
        h += `<button class="f-btn ${f.c} ${pFilter === f.t ? 'on' : ''}" onclick="pFilter='${f.t}';renderProgress()">${P.sessions[f.t].label.toUpperCase()}</button>`;
      });
      h += `</div>`;

      h += `<div class="chart-expand ${expandEx ? 'on' : ''}" id="ce">`;
      if (expandEx) {
        const ex = allEx.find(e => e.id === expandEx);
        if (ex) {
          const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined).map(l => ({ d: l.date, v: l.weights[ex.id] }));
          h += `<div class="ce-title">${ex.name}</div><div class="ce-sub">${ex.sets} · ${pts.length} sessioni tracciate</div>`;
          if (pts.length >= 2) h += `<div class="chart-scroll">${bigChart(pts, col)}</div>`;
          else h += `<div style="font-size:13px;color:var(--fg3);padding:16px 0">Dati insufficienti</div>`;
          h += `<button onclick="expandEx=null;renderProgress()" style="margin-top:14px;background:transparent;border:1px solid var(--ln);border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.08em;color:var(--fg3);padding:6px 14px;cursor:pointer;">✕ CHIUDI</button>`;
        }
      }
      h += `</div>`;

      h += `<div class="prog-grid">`;
      for (const ex of allEx.slice(0, 4)) {
        const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined).map(l => ({ d: l.date, v: l.weights[ex.id] }));
        const last = pts.length ? pts[pts.length - 1].v : ex.kg, first = pts.length ? pts[0].v : ex.kg, d = last - first;
        h += `<div class="prog-card" onclick="expandEx='${ex.id}';renderProgress()">
    <div class="pc-name">${ex.name}</div><div class="pc-sub">${ex.sets}</div>
    ${pts.length >= 2 ? `<svg class="sparkline" viewBox="0 0 120 46" preserveAspectRatio="none">${spark(pts, col, 120, 46)}</svg>` : `<div class="no-spark">—</div>`}
    <div class="pc-kg" style="color:${col}">${last}kg</div>
    <div class="pc-delta" style="color:${d > 0 ? 'var(--pull)' : d < 0 ? 'var(--push)' : 'var(--fg3)'}">${d > 0 ? '+' : ''}${d.toFixed(1)}kg</div>
    </div>`;
      }
      h += `</div>`;

      if (allLogs.length) {
        h += `<div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-bottom:12px">TUTTI I CARICHI</div>`;
        h += `<table class="all-tbl"><thead><tr><th>ESERCIZIO</th><th>INIZIO</th><th>ORA</th><th>Δ</th><th>1RM</th></tr></thead><tbody>`;
        for (const ex of allEx) {
          const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined); if (!pts.length) continue;
          const first = pts[0].weights[ex.id], last = pts[pts.length - 1].weights[ex.id], d = last - first;
          const o = orm(last, 8); const dl = isDeload(state, pFilter, ex.id);
          h += `<tr onclick="expandEx='${ex.id}';renderProgress()">
      <td><div class="td-n">${ex.name}${dl ? ' <span style="color:var(--legs)">⚠</span>' : ''}</div><div class="td-s">${ex.sets}</div></td>
      <td style="color:var(--fg3)">${first}</td><td>${last}</td>
      <td style="color:${d > 0 ? 'var(--pull)' : d < 0 ? 'var(--push)' : 'var(--fg3)'}">${d > 0 ? '+' : ''}${d.toFixed(1)}</td>
      <td style="color:var(--acc)">${o ? o : '—'}</td>
      </tr>`;
        }
        h += `</tbody></table>`;
      } else {
        h += `<div class="empty"><span class="empty-ic">📊</span><div class="empty-t">NESSUN DATO</div><div class="empty-s">Completa sessioni ${pFilter.toUpperCase()}</div></div>`;
      }
      el.innerHTML = h;
    }

    function spark(pts, col, W, H) {
      const vals = pts.map(p => p.v), min = Math.min(...vals), max = Math.max(...vals), rng = max - min || 1, P2 = 3;
      const points = pts.map((p, i) => `${(P2 + i * (W - P2 * 2) / (pts.length - 1)).toFixed(1)},${(H - P2 - (p.v - min) / rng * (H - P2 * 2)).toFixed(1)}`).join(' ');
      const lx = P2 + (pts.length - 1) * (W - P2 * 2) / (pts.length - 1), ly = H - P2 - (pts[pts.length - 1].v - min) / rng * (H - P2 * 2);
      return `<polyline fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"/>
  <polygon fill="${col}" fill-opacity="0.1" points="${P2},${H} ${points} ${lx.toFixed(1)},${H}"/>
  <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3" fill="${col}"/>`;
    }

    function bigChart(pts, col) {
      const vals = pts.map(p => p.v), min = Math.min(...vals) - 1, max = Math.max(...vals) + 1, rng = max - min || 1;
      const W = 380, H = 110, PX = 32, PY = 8, iW = W - PX * 2, iH = H - PY * 2;
      const x = i => PX + i * (iW / (pts.length - 1));
      const y = v => PY + iH - (v - min) / rng * iH;
      const points = pts.map((p, i) => `${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
      const step = Math.max(1, Math.ceil(pts.length / 4));
      let xH = ''; pts.forEach((p, i) => { if (i % step === 0 || i === pts.length - 1) xH += `<text x="${x(i).toFixed(1)}" y="${H - 1}" text-anchor="middle" fill="var(--fg3)" font-family="Bebas Neue,sans-serif" font-size="10" font-weight="400">${p.d.slice(5)}</text>` });
      let yH = '';[min, max].forEach(v => { yH += `<text x="${PX - 3}" y="${y(v).toFixed(1)}" text-anchor="end" fill="var(--fg3)" font-family="Bebas Neue,sans-serif" font-size="10" dominant-baseline="middle">${Math.round(v)}</text>` });
      let dots = ''; pts.forEach((p, i) => { dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="4" fill="${col}" opacity=".8"><title>${p.d}: ${p.v}kg</title></circle>` });
      return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="min-width:340px">
  <line x1="${PX}" y1="${PY}" x2="${PX}" y2="${PY + iH}" stroke="var(--ln)" stroke-width="1"/>
  <line x1="${PX}" y1="${PY + iH}" x2="${PX + iW}" y2="${PY + iH}" stroke="var(--ln)" stroke-width="1"/>
  ${yH}${xH}
  <polyline fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="${points}"/>
  <polygon fill="${col}" fill-opacity="0.07" points="${PX},${PY + iH} ${points} ${x(pts.length - 1).toFixed(1)},${PY + iH}"/>
  ${dots}</svg>`;
    }

    function renderHistory() {
      const state = gs(), logs = Object.values(state.logs || {}).sort((a, b) => b.date > a.date ? 1 : -1);
      const el = document.getElementById('pg-history');
      let h = `<div class="sec-hd"><div class="sec-title">LOG</div>${logs.length ? `<button class="del-btn" onclick="clearAll()">CANCELLA</button>` : ''}</div>`;
      if (!logs.length) { h += `<div class="empty"><span class="empty-ic">📋</span><div class="empty-t">NESSUNA SESSIONE</div><div class="empty-s">Le sessioni completate appariranno qui</div></div>`; el.innerHTML = h; return }
      h += `<div class="hist-list">`;
      for (const log of logs) {
        if (!log.type || !P.sessions[log.type]) continue;
        const sess = P.sessions[log.type];
        const allEx = sess.groups.flatMap(g => g.ex);
        const cc = Object.values(log.checked || {}).filter(Boolean).length;
        const sw = Object.keys(log.swaps || {}).length;
        let vol = 0; if (log.setLogs) Object.values(log.setLogs).forEach(s => s.filter(x => x.done && x.kg && x.reps).forEach(x => vol += x.kg * (parseInt(x.reps) || 0)));
        h += `<div class="hist-item">
    <div class="hist-bar" style="background:${P.colors[log.type]}"></div>
    <div style="flex:1;min-width:0">
      <div class="hist-name">${sess.label.toUpperCase()}${sw ? ` <span style="font-size:11px;color:var(--acc)">${sw}↻</span>` : ''}</div>
      <div class="hist-d">${fmt(log.date)}${vol > 0 ? ` · ${vol.toLocaleString('it-IT')}kg` : ''}</div>
    </div>
    <div class="hist-r"><div class="hist-n">${cc}/${allEx.length}</div>${log.done ? '<div class="hist-ok">✓ OK</div>' : ''}</div>
    </div>`;
      }
      h += `</div>`;
      h += `<div class="tools-row"><button class="tool-btn" onclick="expData()">↑ EXPORT</button><button class="tool-btn" onclick="impData()">↓ IMPORT</button></div>`;
      h += `<button class="logout-btn" onclick="logout()">ESCI / BLOCCA</button>`;
      el.innerHTML = h;
    }
    function clearAll() { if (confirm('Cancellare tutto? Irreversibile.')) { localStorage.removeItem(KEY); renderHistory(); updStreak() } }

    function renderBW() {
      const state = gs(), bw = state.bwLog || {};
      const entries = Object.entries(bw).sort((a, b) => a[0] > b[0] ? 1 : -1);
      const latest = entries.length ? entries[entries.length - 1] : null;
      const el = document.getElementById('pg-bw');
      let h = `<div class="ph"><div class="ph-title">PESO</div><div class="ph-sub">Obiettivo: 65–67 kg</div></div>`;
      if (latest) {
        const v = latest[1], inZ = v >= 65 && v <= 67;
        h += `<div class="bw-big" style="color:${inZ ? 'var(--pull)' : v > 67 ? 'var(--push)' : 'var(--legs)'}">${v}<span style="font-size:28px"> KG</span></div>`;
        h += `<div style="font-size:13px;color:var(--fg3);margin-bottom:16px">${fmt(latest[0])} · ${inZ ? '✓ In zona target' : v > 67 ? '↑ Sopra — taglia 100/200 kcal' : '↓ Sotto — mangia di più'}</div>`;
      }
      h += `<div class="bw-inp-row">
  <input class="bw-field" type="number" id="bw-in" value="${latest ? latest[1] : ''}" min="30" max="300" step="0.1" placeholder="68.0" onkeydown="if(event.key==='Enter')saveBW()">
  <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--fg3)">KG</span>
  <button class="bw-save" onclick="saveBW()">SALVA</button>
  </div>`;
      h += `<div class="bw-target">Zona target: <b>65–67 kg</b> · Proteine min <b>110–130g/giorno</b> · Pesati ogni mattina a digiuno</div>`;
      if (entries.length >= 2) {
        const pts = entries.map(([d, v]) => ({ d, v }));
        h += `<div style="background:var(--s1);border:1px solid var(--ln);border-radius:14px;padding:16px;margin-bottom:18px">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;margin-bottom:12px">TREND PESO</div>
    <div class="chart-scroll">${bigChart(pts, 'var(--acc)')}</div>
    </div>`;
      }
      if (entries.length) {
        h += `<table class="bw-tbl"><thead><tr><th>DATA</th><th>PESO</th><th>Δ</th></tr></thead><tbody>`;
        entries.slice().reverse().slice(0, 20).forEach(([d, v], i, arr) => {
          const prev = arr[i + 1] ? arr[i + 1][1] : null, delta = prev !== null ? v - prev : null;
          h += `<tr><td style="color:var(--fg3)">${fmt(d)}</td><td>${v}kg</td><td style="color:${delta === null ? 'var(--fg3)' : delta < 0 ? 'var(--pull)' : delta > 0 ? 'var(--push)' : 'var(--fg3)'}">${delta === null ? '—' : (delta > 0 ? '+' : '') + delta.toFixed(1)}</td></tr>`;
        });
        h += `</tbody></table>`;
      } else {
        h += `<div class="empty"><span class="empty-ic">⚖️</span><div class="empty-t">NESSUNA MISURAZIONE</div><div class="empty-s">Inserisci il peso ogni mattina</div></div>`;
      }
      el.innerHTML = h;
    }
    function saveBW() {
      const inp = document.getElementById('bw-in'); if (!inp) return;
      const v = parseFloat(inp.value); if (!v || v < 30 || v > 300) { inp.style.borderColor = 'var(--push)'; setTimeout(() => inp.style.borderColor = '', 1500); return }
      const s = gs(); if (!s.bwLog) s.bwLog = {}; s.bwLog[today()] = v; ss(s); renderBW();
    }

    function expData() { const blob = new Blob([JSON.stringify(gs(), null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'ppl-' + today() + '.json'; a.click(); URL.revokeObjectURL(url) }
    function impData() { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json'; inp.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const d = JSON.parse(ev.target.result); if (d && confirm('Importare? I dati attuali saranno sovrascritti.')) { localStorage.setItem(KEY, JSON.stringify(d)); nav('today'); alert('Import ✓') } } catch (err) { alert('Errore: ' + err.message) } }; r.readAsText(f) }; inp.click() }
    function logout() { localStorage.removeItem('ppl_auth'); document.getElementById('pin-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; setTimeout(() => { const i = document.getElementById('pin-in'); if (i) { i.value = ''; i.focus() } }, 80) }

    function checkPin() {
      const inp = document.getElementById('pin-in'), err = document.getElementById('pin-err');
      if (!inp) return;
      if (inp.value === PIN) {
        localStorage.setItem('ppl_auth', '1');
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        boot();
      } else {
        err.textContent = 'PIN ERRATO'; inp.value = ''; inp.focus();
        inp.style.borderColor = 'var(--push)';
        setTimeout(() => { inp.style.borderColor = ''; err.textContent = '' }, 1600);
      }
    }
    function boot() {
      initTheme();
      const ind = document.getElementById('nav-ind'); if (ind) { ind.style.left = '0'; ind.style.width = '25%' }
      nav('today');
    }

    (function () {
      initTheme();
      if (localStorage.getItem('ppl_auth') === '1') {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        boot();
      } else {
        document.getElementById('pin-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        setTimeout(() => { const i = document.getElementById('pin-in'); if (i) i.focus() }, 80);
      }
    })();
  </script>
</body>

</html>
