<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PPL Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --bg2: #111;
      --bg3: #191919;
      --bg4: #222;
      --bg5: #2a2a2a;
      --b1: #252525;
      --b2: #353535;
      --b3: #484848;
      --t1: #f0ede6;
      --t2: #9e9b94;
      --t3: #555250;
      --t4: #333;
      --push: #ff5c35;
      --pull: #2dcc7a;
      --legs: #f5a623;
      --acc: #7c6ef5;
      --r: 8px;
      --rl: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px
    }

    ::-webkit-scrollbar-thumb {
      background: var(--b2);
      border-radius: 2px
    }

    input[type=number] {
      -moz-appearance: textfield
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none
    }

    button {
      font-family: 'Syne', sans-serif
    }

    body.dim-mode {
      filter: brightness(.55) saturate(.7)
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh
    }

    .topbar {
      display: none;
      background: var(--bg2);
      border-bottom: 1px solid var(--b1);
      padding: 14px 16px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.5px
    }

    .topbar-logo span {
      color: var(--acc)
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .topbar-streak {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--t2)
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      flex: 1
    }

    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto
    }

    .sb-logo {
      padding: 22px 18px 18px;
      border-bottom: 1px solid var(--b1)
    }

    .sb-logo-text {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -.5px
    }

    .sb-logo-text span {
      color: var(--acc)
    }

    .sb-logo-sub {
      font-size: 10px;
      color: var(--t3);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 3px;
      font-family: 'JetBrains Mono', monospace
    }

    .sb-stats {
      padding: 14px 18px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      gap: 9px
    }

    .sb-stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline
    }

    .sb-stat-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em
    }

    .sb-stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500
    }

    .sb-week {
      padding: 14px 18px;
      border-bottom: 1px solid var(--b1)
    }

    .sb-section-title {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 9px
    }

    .week-days {
      display: flex;
      flex-direction: column;
      gap: 3px
    }

    .wd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: var(--r);
      border: 1px solid transparent;
      transition: all .15s
    }

    .wd.today {
      background: var(--bg3);
      border-color: var(--b2)
    }

    .wd-name {
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      width: 28px
    }

    .wd-type {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em
    }

    .wd-done {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--pull);
      opacity: 0;
      transition: opacity .2s
    }

    .wd.done .wd-done {
      opacity: 1
    }

    .type-push {
      color: var(--push)
    }

    .type-pull {
      color: var(--pull)
    }

    .type-legs {
      color: var(--legs)
    }

    .type-rest {
      color: var(--t4)
    }

    .sb-nav {
      padding: 14px 18px;
      flex: 1
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 9px;
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      margin-bottom: 2px
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--t2)
    }

    .nav-item.active {
      background: var(--bg4);
      color: var(--t1);
      border-color: var(--b2)
    }

    .nav-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: .5
    }

    .nav-item.active .nav-icon {
      opacity: 1
    }

    .sb-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--b1)
    }

    .sb-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--t3)
    }

    .main {
      overflow-y: auto;
      min-width: 0
    }

    .main-inner {
      padding: 28px 32px 80px;
      max-width: 900px
    }

    .bottom-nav {
      display: none;
      background: var(--bg2);
      border-top: 1px solid var(--b1);
      grid-template-columns: repeat(4, 1fr);
      position: sticky;
      bottom: 0;
      z-index: 100
    }

    .bn-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      cursor: pointer;
      color: var(--t3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: color .15s
    }

    .bn-item svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .bn-item.active {
      color: var(--t1)
    }

    .page-header {
      margin-bottom: 24px
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1.1
    }

    .page-sub {
      font-size: 12px;
      color: var(--t2);
      margin-top: 5px
    }

    .session-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .ss-btn {
      padding: 9px 18px;
      border-radius: 99px;
      border: 1px solid var(--b1);
      background: transparent;
      color: var(--t3);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .18s;
      text-transform: uppercase
    }

    .ss-btn:hover {
      background: var(--bg3);
      border-color: var(--b2)
    }

    .ss-btn.active-push {
      background: rgba(255, 92, 53, .12);
      border-color: rgba(255, 92, 53, .4);
      color: var(--push)
    }

    .ss-btn.active-pull {
      background: rgba(45, 204, 122, .12);
      border-color: rgba(45, 204, 122, .4);
      color: var(--pull)
    }

    .ss-btn.active-legs {
      background: rgba(245, 166, 35, .12);
      border-color: rgba(245, 166, 35, .4);
      color: var(--legs)
    }

    .session-type-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px
    }

    .stype-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 11px;
      border-radius: 99px;
      text-transform: uppercase;
      flex-shrink: 0
    }

    .badge-push {
      background: rgba(255, 92, 53, .12);
      color: var(--push)
    }

    .badge-pull {
      background: rgba(45, 204, 122, .12);
      color: var(--pull)
    }

    .badge-legs {
      background: rgba(245, 166, 35, .12);
      color: var(--legs)
    }

    .stype-name {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
      min-width: 120px
    }

    .stype-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto
    }

    .progress-ring-wrap {
      position: relative;
      width: 40px;
      height: 40px
    }

    .progress-ring-wrap svg {
      transform: rotate(-90deg)
    }

    .pr-bg {
      fill: none;
      stroke: var(--b1);
      stroke-width: 3
    }

    .pr-fg {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset .4s ease
    }

    .pr-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500
    }

    .timer-widget {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 16px 20px;
      margin-bottom: 18px
    }

    .timer-top {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap
    }

    .timer-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px
    }

    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -.02em;
      min-width: 80px
    }

    .timer-display.running {
      color: var(--pull)
    }

    .timer-display.paused {
      color: var(--legs)
    }

    .timer-controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .tbtn {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 7px 12px;
      color: var(--t1);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em
    }

    .tbtn:hover {
      background: var(--bg4);
      border-color: var(--b2)
    }

    .tbtn.tstart {
      background: rgba(45, 204, 122, .1);
      border-color: rgba(45, 204, 122, .25);
      color: var(--pull)
    }

    .tbtn.tstop {
      background: rgba(255, 92, 53, .08);
      border-color: rgba(255, 92, 53, .25);
      color: var(--push)
    }

    .timer-presets {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      flex-wrap: wrap
    }

    .preset {
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 5px 9px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s
    }

    .preset:hover {
      background: var(--bg3);
      color: var(--t2);
      border-color: var(--b2)
    }

    .timer-bar-wrap {
      margin-top: 10px;
      height: 3px;
      background: var(--b1);
      border-radius: 2px;
      overflow: hidden
    }

    .timer-bar {
      height: 3px;
      background: var(--pull);
      border-radius: 2px;
      transition: width .95s linear;
      width: 0%
    }

    /* RPE badge */
    .rpe-tag {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px
    }

    .rpe-8 {
      background: rgba(45, 204, 122, .12);
      color: var(--pull);
      border: 1px solid rgba(45, 204, 122, .3)
    }

    .rpe-9 {
      background: rgba(255, 92, 53, .1);
      color: var(--push);
      border: 1px solid rgba(255, 92, 53, .25)
    }

    .rpe-std {
      background: rgba(124, 110, 245, .1);
      color: var(--acc);
      border: 1px solid rgba(124, 110, 245, .25)
    }

    /* new exercise badge */
    .new-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      background: rgba(45, 204, 122, .12);
      color: var(--pull);
      border: 1px solid rgba(45, 204, 122, .3)
    }

    .increase-tag {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
      background: rgba(245, 166, 35, .12);
      color: var(--legs);
      border: 1px solid rgba(245, 166, 35, .3)
    }

    .ex-group {
      margin-bottom: 18px
    }

    .ex-group-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 7px;
      padding-left: 1px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .ex-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--b1)
    }

    .ex-card {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color .2s
    }

    .ex-card:hover {
      border-color: var(--b2)
    }

    .ex-card.done {
      opacity: .5
    }

    .ex-card.done .ex-name {
      text-decoration: line-through;
      text-decoration-color: var(--t3)
    }

    .ex-main {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: start;
      gap: 10px;
      padding: 13px 14px
    }

    .ex-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--b2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      flex-shrink: 0;
      color: transparent;
      margin-top: 2px
    }

    .ex-check:hover {
      border-color: var(--b3);
      background: var(--bg3)
    }

    .ex-check.checked {
      background: var(--pull);
      border-color: var(--pull);
      color: #000
    }

    .ex-check svg {
      width: 11px;
      height: 11px
    }

    .ex-body {
      min-width: 0
    }

    .ex-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .ex-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      flex-wrap: wrap
    }

    .ex-sets {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--t2)
    }

    .ex-note-inline {
      font-size: 11px;
      color: var(--t3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px
    }

    .ex-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0
    }

    .ex-kg-wrap {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .ex-kg {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      width: 62px;
      padding: 6px 8px;
      text-align: center;
      outline: none;
      transition: border-color .15s
    }

    .ex-kg:focus {
      border-color: var(--b3);
      background: var(--bg4)
    }

    .kg-unit {
      font-size: 10px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace
    }

    .ex-trend {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--t3)
    }

    .trend-up {
      color: var(--pull)
    }

    .trend-down {
      color: var(--push)
    }

    .orm-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--acc);
      background: rgba(124, 110, 245, .1);
      border: 1px solid rgba(124, 110, 245, .2);
      border-radius: 4px;
      padding: 2px 5px;
      margin-top: 2px;
      display: inline-block
    }

    .deload-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--legs);
      background: rgba(245, 166, 35, .1);
      border: 1px solid rgba(245, 166, 35, .25);
      border-radius: 4px;
      padding: 2px 5px;
      margin-top: 2px;
      display: inline-block
    }

    .setlog-area {
      padding: 0 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .setlog-title {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px
    }

    .setlog-rows {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .setlog-row {
      display: flex;
      align-items: center;
      gap: 6px
    }

    .setlog-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--t3);
      width: 18px;
      text-align: right;
      flex-shrink: 0
    }

    .setlog-kg {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: 6px;
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 56px;
      padding: 5px 7px;
      text-align: center;
      outline: none;
      transition: border-color .15s
    }

    .setlog-kg:focus {
      border-color: var(--b3)
    }

    .setlog-reps {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: 6px;
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 44px;
      padding: 5px 7px;
      text-align: center;
      outline: none;
      transition: border-color .15s
    }

    .setlog-reps:focus {
      border-color: var(--b3)
    }

    .setlog-sep {
      font-size: 10px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace
    }

    .setlog-done {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1.5px solid var(--b2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
      color: transparent
    }

    .setlog-done.ok {
      background: rgba(45, 204, 122, .15);
      border-color: rgba(45, 204, 122, .4);
      color: var(--pull)
    }

    .setlog-done svg {
      width: 9px;
      height: 9px
    }

    .setlog-add {
      background: transparent;
      border: 1px dashed var(--b1);
      border-radius: 6px;
      color: var(--t3);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em;
      align-self: flex-start;
      margin-top: 2px
    }

    .setlog-add:hover {
      border-color: var(--b2);
      color: var(--t2)
    }

    .ex-actions {
      padding: 0 14px 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .swap-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 5px 10px;
      color: var(--t3);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em
    }

    .swap-btn:hover {
      background: var(--bg3);
      border-color: var(--b2);
      color: var(--t2)
    }

    .swap-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round
    }

    .toggle-sets-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 5px 10px;
      color: var(--t3);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em

    .toggle-sets-btn:hover {
      background: var(--bg3);
      border-color: var(--b2);
      color: var(--t2)
    }

    .alts-panel {
      background: var(--bg3);
      border-top: 1px solid var(--b1);
      padding: 12px 14px
    }

    .alts-title {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px
    }

    .alt-options {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .alt-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s;
      gap: 10px
    }

    .alt-opt:hover {
      border-color: var(--b2);
      background: var(--bg4)
    }

    .alt-opt-info {
      min-width: 0

    .alt-opt-name {
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .alt-opt-meta {
      font-size: 10px;
      color: var(--t3);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace
    }

    .use-btn {
      background: var(--acc);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
      letter-spacing: .03em

    .use-btn:hover {
      opacity: .85

    .alts-close {
      font-size: 11px;
      color: var(--t3);

      margin-top: 8px;
      display: inline-block

    .alts-close:hover {
      color: var(--t2)

    .warmup-panel {
      background: rgba(124, 110, 245, .05);
      border: 1px solid rgba(124, 110, 245, .15);
      border-radius: var(--r);
      padding: 10px 14px;
      margin: 0 14px 10px
    }

    .warmup-title {
      font-size: 10px;
      color: var(--acc);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 7px;
      font-weight: 700
    }

    .warmup-rows {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .warmup-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--t2)

    .warmup-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--acc);
      flex-shrink: 0;
      opacity: .5
    }

    /* Progressione tip box */
    .prog-tip {
      background: rgba(45, 204, 122, .05);
      border: 1px solid rgba(45, 204, 122, .15);
      border-radius: var(--r);
      padding: 10px 14px;
      margin: 0 14px 12px;
      font-size: 11px;
      color: var(--t2)
    }

    .prog-tip b {
      color: var(--pull);
      font-weight: 600
    }

    .cardio-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--t2)
    }

    .cardio-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--acc);
      flex-shrink: 0
    }

    .complete-zone {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap
    }

    .complete-btn {
      background: var(--pull);
      color: #000;
      border: none;
      border-radius: var(--r);
      padding: 11px 22px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .02em
    }

    .complete-btn:hover {
      filter: brightness(1.1)
    }

    .complete-btn:active {
      transform: scale(.97)
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--pull);
      font-size: 13px;
      font-weight: 600
    }

    .complete-hint {
      font-size: 11px;
      color: var(--t3)
    }

    .rest-card {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 48px 32px;
      text-align: center
    }

    .rest-icon {
      font-size: 36px;
      margin-bottom: 14px
    }

    .rest-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px
    }

    .rest-sub {
      color: var(--t2);
      font-size: 13px
    }

    .rest-tip {
      margin-top: 20px;
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 14px;
      font-size: 12px;
      color: var(--t2);
      max-width: 360px;
      margin-left: auto;
      margin-right: auto
    }

    .sched-pick {
      margin-top: 20px
    }

    .sched-pick-title {
      font-size: 12px;
      color: var(--t2);
      margin-bottom: 12px
    }

    .sched-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .sched-btn {
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--b1);
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .04em;
      text-transform: uppercase
    }

    .sched-btn:hover {
      background: var(--bg3)
    }

    .sched-btn-push {
      color: var(--push)
    }

    .sched-btn-pull {
      color: var(--pull)
    }

    .sched-btn-legs {
      color: var(--legs)
    }

    .prog-filter {
      display: flex;
      gap: 7px;
      margin-bottom: 22px;
      flex-wrap: wrap
    }

    .pf-btn {
      padding: 6px 14px;
      border-radius: var(--r);
      border: 1px solid var(--b1);
      background: transparent;
      color: var(--t3);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em
    }

    .pf-btn:hover {
      background: var(--bg3);
      color: var(--t2)
    }

    .pf-btn.active {
      background: var(--bg3);
      color: var(--t1);
      border-color: var(--b2)
    }

    .prog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 28px
    }

    .prog-card {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color .2s
    }

    .prog-card:hover {
      border-color: var(--b2)
    }

    .prog-card-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .prog-card-sub {
      font-size: 10px;
      color: var(--t3);
      margin-bottom: 14px;
      font-family: 'JetBrains Mono', monospace
    }

    .chart-wrap {
      height: 70px
    }

    .sparkline {
      width: 100%;
      height: 70px
    }

    .no-data-spark {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 70px;
      font-size: 11px;
      color: var(--t3)
    }

    .prog-delta {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: baseline
    }

    .delta-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500
    }

    .delta-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em
    }

    .chart-expanded {
      background: var(--bg2);
      border: 1px solid var(--b2);
      border-radius: var(--rl);
      padding: 20px;
      margin-bottom: 20px;
      display: none
    }

    .chart-expanded.open {
      display: block
    }

    .chart-exp-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .chart-exp-sub {
      font-size: 11px;
      color: var(--t3);
      margin-bottom: 16px
    }

    .chart-svg-wrap {
      width: 100%;
      overflow-x: auto
    }

    .chart-svg-wrap svg {
      min-width: 400px
    }

    .vol-table {
      width: 100%;
      border-collapse: collapse
    }

    .vol-table th {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 7px 0;
      border-bottom: 1px solid var(--b1);
      text-align: left;
      font-weight: 400
    }

    .vol-table th:not(:first-child) {
      text-align: right
    }

    .vol-table td {
      padding: 10px 0;
      border-bottom: 1px solid var(--b1);
      font-size: 12px;
      vertical-align: middle
    }

    .vol-table tr:last-child td {
      border-bottom: none
    }

    .vol-table tr:hover td {
      background: var(--bg3)
    }

    .vol-table td:not(:first-child) {
      text-align: right;
      font-family: 'JetBrains Mono', monospace
    }

    .vol-name {
      font-weight: 600;
      font-size: 12px
    }

    .vol-sub {
      font-size: 10px;
      color: var(--t3);
      margin-top: 2px
    }

    .kg-now {
      color: var(--t1)
    }

    .kg-was {
      color: var(--t3)
    }

    .kg-up {
      color: var(--pull);
      font-size: 11px
    }

    .kg-down {
      color: var(--push);
      font-size: 11px
    }

    .kg-same {
      color: var(--t3);
      font-size: 11px
    }

    .hist-list {
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    .hist-item {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      transition: border-color .15s
    }

    .hist-item:hover {
      border-color: var(--b2)
    }

    .hist-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .hist-name {
      font-size: 13px;
      font-weight: 600
    }

    .hist-date {
      font-size: 11px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px
    }

    .hist-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--t2);
      text-align: right
    }

    .hist-done-tag {
      font-size: 10px;
      color: var(--pull);
      font-weight: 700;
      letter-spacing: .04em;
      margin-top: 2px
    }

    .bw-section {
      margin-top: 28px
    }

    .bw-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .bw-input {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      width: 80px;
      padding: 8px 10px;
      text-align: center;
      outline: none;
      transition: border-color .15s
    }

    .bw-input:focus {
      border-color: var(--b3)
    }

    .bw-save {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t1);
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em
    }

    .bw-save:hover {
      background: var(--bg4);
      border-color: var(--b2)
    }

    .bw-label {
      font-size: 11px;
      color: var(--t3)
    }

    .bw-chart-wrap {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 18px;
      margin-bottom: 14px
    }

    .bw-chart-title {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px
    }

    .data-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px
    }

    .data-btn {
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t2);
      font-size: 11px;
      font-weight: 700;
      padding: 7px 13px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em
    }

    .data-btn:hover {
      background: var(--bg3);
      border-color: var(--b2)
    }

    .data-btn.danger:hover {
      border-color: var(--push);
      color: var(--push)
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.4px
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t3);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em
    }

    .clear-btn:hover {
      border-color: var(--push);
      color: var(--push)
    }

    .empty {
      text-align: center;
      padding: 56px 20px;
      color: var(--t3)
    }

    .empty-icon {
      font-size: 32px;
      margin-bottom: 14px;
      opacity: .5
    }

    .empty-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--t2);
      margin-bottom: 5px
    }

    .empty-sub {
      font-size: 12px
    }

    .fade-in {
      animation: fadeIn .25s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* Sezione RPE rapida */
    .rpe-quick {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px
    }

    .rpe-chip {
      padding: 5px 11px;
      border-radius: 99px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      border: 1px solid var(--b1);
      color: var(--t3)
    }

    .rpe-chip.target {
      background: rgba(45, 204, 122, .08);
      border-color: rgba(45, 204, 122, .3);
      color: var(--pull)
    }

    @media(max-width:720px) {
      .topbar {
        display: flex
      }

      .bottom-nav {
        display: grid
      }

      .shell {
        grid-template-columns: 1fr
      }

      .sidebar {
        display: none
      }

      .app {
        grid-template-rows: auto 1fr auto
      }

      .main-inner {
        padding: 16px 14px 16px
      }

      .page-title {
        font-size: 20px
      }

      .session-type-bar {
        padding: 12px 14px
      }

      .stype-name {
        font-size: 14px
      }

      .timer-widget {
        padding: 13px 14px
      }

      .timer-display {
        font-size: 24px
      }

      .prog-grid {
        grid-template-columns: 1fr 1fr
      }

      .ex-note-inline {
        display: none
      }

      .ex-main {
        gap: 8px;
        padding: 11px 12px
      }

      .ex-kg {
        width: 56px
      }
    }

    @media(max-width:400px) {
      .prog-grid {
        grid-template-columns: 1fr
      }

      .session-selector {
        gap: 6px
      }

      .ss-btn {
        padding: 7px 13px;
        font-size: 11px
      }
    }
  </style>
</head>

<body>

  <div id="pin-screen"
    style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;">
    <div style="text-align:center;max-width:300px;width:90%;">
      <div style="font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;">PPL<span
          style="color:var(--acc);">.</span></div>
      <div
        style="font-size:11px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:40px;">
        tracker privato</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:16px;font-weight:600;">Inserisci il PIN</div>
      <input id="pin-input" type="password" inputmode="numeric" maxlength="8"
        style="width:100%;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rl);color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:24px;letter-spacing:.3em;padding:14px 16px;text-align:center;outline:none;transition:border-color .2s;"
        onkeydown="if(event.key==='Enter')checkPin()" placeholder="••••">
      <div id="pin-err"
        style="height:18px;font-size:11px;color:var(--push);margin-top:10px;font-family:'JetBrains Mono',monospace;">
      </div>
      <button onclick="checkPin()"
        style="width:100%;margin-top:12px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;">Entra</button>
      <div style="margin-top:24px;font-size:10px;color:var(--t3);">PIN modificabile nel codice — cerca CORRECT_PIN</div>
    </div>
  </div>

  <div id="main-app" style="display:none;" class="app">
    <header class="topbar">
      <div class="topbar-logo">PPL<span>.</span></div>
      <div class="topbar-right">
        <button onclick="toggleDim()"
          style="background:transparent;border:1px solid var(--b1);border-radius:var(--r);color:var(--t3);font-size:10px;font-weight:700;padding:4px 8px;cursor:pointer;letter-spacing:.04em;"
          id="dim-btn-mob">DIM</button>
        <span class="topbar-streak" id="mob-streak">0 🔥</span>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <div class="sb-logo">
          <div class="sb-logo-text">PPL<span>.</span></div>
          <div class="sb-logo-sub" id="sb-dayname">tracker</div>
        </div>
        <div class="sb-stats">
          <div class="sb-stat"><span class="sb-stat-label">Sessioni</span><span class="sb-stat-val"
              id="sb-total">0</span></div>
          <div class="sb-stat"><span class="sb-stat-label">Questa sett.</span><span class="sb-stat-val"
              id="sb-week-count">0</span></div>
          <div class="sb-stat"><span class="sb-stat-label">Streak</span><span class="sb-stat-val"
              id="sb-streak">0</span></div>
        </div>
        <div class="sb-week">
          <div class="sb-section-title">Piano settimana</div>
          <div class="week-days" id="week-days"></div>
        </div>
        <div class="sb-nav">
          <div class="sb-section-title">Navigazione</div>
          <div class="nav-item active" onclick="nav('today')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Oggi
          </div>
          <div class="nav-item" onclick="nav('progress')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
            Progressi
          </div>
          <div class="nav-item" onclick="nav('history')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            Storico
          </div>
          <div class="nav-item" onclick="nav('bodyweight')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            Peso
          </div>
        </div>
        <div class="sb-footer">

    // Regola doppia progressione: quando aumentare
    // Completi tutte le reps su tutte le serie → +passo minimo al prossimo allenamento

    const DAYS = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
    // Schema 1 giorno sì / 1 giorno no — rotazione Push→Pull→Legs indipendente dal giorno
    const BASE_WEEK = ['push', 'rest', 'pull', 'rest', 'legs', 'rest', 'push'];

    function gs() { try { return JSON.parse(localStorage.getItem('ppl_v8') || '{}') } catch (e) { return {} } }
    function ss(s) { localStorage.setItem('ppl_v8', JSON.stringify(s)) }
    function today() { return new Date().toISOString().slice(0, 10) }
    function weekStart() { const d = new Date(), day = d.getDay(), diff = (day === 0 ? -6 : 1 - day), m = new Date(d); m.setDate(d.getDate() + diff); return m.toISOString().slice(0, 10) }
    function dayOfWeek() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1 }
    function dateOffset(off) { const d = new Date(); d.setDate(d.getDate() + off); return d.toISOString().slice(0, 10) }
    function fmtDate(iso) { const d = new Date(iso + 'T12:00:00'); return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: '2-digit' }) }
    function calc1RM(kg, reps) { if (!kg || !reps || reps <= 0) return null; if (reps === 1) return kg; return Math.round(kg * (1 + reps / 30)) }

    let timerInt = null, timerSec = 0, timerTotal = 0, timerRunning = false;
    function timerTick() { if (timerSec <= 0) { clearInterval(timerInt); timerRunning = false; timerSec = 0; updateTimerDisplay(); playBeep(); vibrateEnd(); return } timerSec--; updateTimerDisplay(); updateTimerBar() }
    function startTimer() { if (timerRunning || timerSec <= 0) return; timerRunning = true; timerInt = setInterval(timerTick, 1000); updateTimerDisplay() }
    function pauseTimer() { clearInterval(timerInt); timerRunning = false; updateTimerDisplay() }
    function resetTimer(preset) { clearInterval(timerInt); timerRunning = false; timerSec = preset || 0; timerTotal = timerSec; updateTimerBar(); updateTimerDisplay(); if (preset > 0) startTimer() }
    function updateTimerDisplay() { const el = document.getElementById('timer-display'); if (!el) return; const m = Math.floor(timerSec / 60), s = timerSec % 60; el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s; el.className = 'timer-display' + (timerRunning ? ' running' : timerSec > 0 ? ' paused' : '') }
    function updateTimerBar() { const el = document.getElementById('timer-bar'); if (!el) return; const pct = timerTotal > 0 ? Math.round((timerSec / timerTotal) * 100) : 0; el.style.width = pct + '%'; el.style.background = pct > 33 ? 'var(--pull)' : pct > 10 ? 'var(--legs)' : 'var(--push)' }
    function playBeep() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)();[0, .15, .3].forEach(t => { const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.setValueAtTime(.3, ctx.currentTime + t); g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + t + .12); o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .12) }) } catch (e) { } }
    function vibrateEnd() { try { if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]) } catch (e) { } }

    let dimMode = false;
    function toggleDim() { dimMode = !dimMode; document.body.classList.toggle('dim-mode', dimMode); const btns = [document.getElementById('dim-btn-sb'), document.getElementById('dim-btn-mob')]; btns.forEach(b => { if (b) b.style.color = dimMode ? 'var(--legs)' : 'var(--t3)' }) }

    let currentView = 'today';
    function nav(v) {
      currentView = v;
      const views = ['today', 'progress', 'history', 'bodyweight'];
      views.forEach(x => { const el = document.getElementById('view-' + x); if (!el) return; el.style.display = x === v ? 'block' : 'none'; if (x === v) { el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in') } });
      document.querySelectorAll('.nav-item').forEach((el, i) => { el.classList.toggle('active', views[i] === v) });
      views.forEach(x => { const b = document.getElementById('bn-' + x); if (b) b.classList.toggle('active', x === v) });
      if (v === 'today') renderToday();
      if (v === 'progress') renderProgress('push');
      if (v === 'history') renderHistory();
      if (v === 'bodyweight') renderBodyweight();
    }

    function updateSidebar() {
      const state = gs(), logs = state.logs || {}, ws = weekStart(), all = Object.values(logs);
      const total = all.length, week = all.filter(l => l.date >= ws).length, streak = calcStreak(state);
      ['sb-total', 'sb-week-count', 'sb-streak'].forEach((id, i) => { const e = document.getElementById(id); if (e) e.textContent = [total, week, streak][i] });
      const mob = document.getElementById('mob-streak'); if (mob) mob.textContent = streak + ' 🔥';
      const now = new Date();
      const sbDay = document.getElementById('sb-dayname'); if (sbDay) sbDay.textContent = now.toLocaleDateString('it-IT', { weekday: 'long' });
      const sbFull = document.getElementById('sb-fulldate'); if (sbFull) sbFull.textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
      const todayIdx = dayOfWeek();
      let whtml = '';
      for (let i = 0; i < 7; i++) {
        const dkey = dateOffset(i - todayIdx);
        const isDone = logs[dkey] && logs[dkey].done;
        const stype = getScheduledType(i, state);
        whtml += `<div class="wd ${i === todayIdx ? 'today' : ''} ${isDone ? 'done' : ''}"><span class="wd-name">${DAYS[i]}</span><span class="wd-type type-${stype}">${stype === 'rest' ? '—' : stype.toUpperCase()}</span><span class="wd-done"></span></div>`;
      }
      const wdEl = document.getElementById('week-days'); if (wdEl) wdEl.innerHTML = whtml;
    }

    function calcStreak(state) { const logs = state.logs || {}; let s = 0; for (let i = 0; i < 60; i++) { const d = dateOffset(-i); if (logs[d] && logs[d].done) s++; else if (i > 0) break } return s }
    function getDefaultForDay(dayIdx) { return BASE_WEEK[dayIdx] || 'rest' }
    function getScheduledType(dayIdx, state) { const dkey = dateOffset(dayIdx - dayOfWeek()); const log = (state.logs || {})[dkey]; if (log && log.type) return log.type; return getDefaultForDay(dayIdx) }
    function getTodaySession() { const state = gs(); const log = (state.logs || {})[today()]; if (log && log.type) return log.type; return getDefaultForDay(dayOfWeek()) }

    function checkDeload(state, stype, exId) {
      const logs = Object.values(state.logs || {}).filter(l => l.type === stype && l.weights && l.weights[exId] !== undefined).sort((a, b) => a.date > b.date ? 1 : -1);
      if (logs.length < 3) return false;
      const last3 = logs.slice(-3).map(l => l.weights[exId]);
      return last3[0] === last3[1] && last3[1] === last3[2];
    }

    function calcWarmup(kg) {
      if (!kg || kg < 20) return [];
      return [
        { pct: 50, reps: 10, kg: Math.round(kg * 0.5 / 2.5) * 2.5 },
        { pct: 70, reps: 5, kg: Math.round(kg * 0.7 / 2.5) * 2.5 },
        { pct: 85, reps: 3, kg: Math.round(kg * 0.85 / 2.5) * 2.5 },
      ];
    }

    function initSetLog(state, dayKey, exId, stype, defaultKg, numSets) {
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      const log = state.logs[dayKey];
      if (!log.setLogs) log.setLogs = {};
      if (!log.setLogs[exId]) {
        const n = parseInt(numSets) || 4;
        log.setLogs[exId] = Array.from({ length: n }, () => ({ kg: defaultKg, reps: '', done: false }));
      }
      return log.setLogs[exId];
    }

    function saveSetField(dayKey, exId, stype, setIdx, field, val) {
      const state = gs();
      if (!state.logs || !state.logs[dayKey] || !state.logs[dayKey].setLogs || !state.logs[dayKey].setLogs[exId]) return;
      state.logs[dayKey].setLogs[exId][setIdx][field] = field === 'done' ? val : (parseFloat(val) || val);
      const sets = state.logs[dayKey].setLogs[exId];
      const doneSets = sets.filter(s => s.done && s.kg);
      if (doneSets.length > 0) state.logs[dayKey].weights[exId] = doneSets[doneSets.length - 1].kg;
      ss(state);
      updateOrmDisplay(exId, state, dayKey);
    }

    function addSet(dayKey, exId, stype) {
      const state = gs();
      if (!state.logs || !state.logs[dayKey] || !state.logs[dayKey].setLogs || !state.logs[dayKey].setLogs[exId]) return;
      const sets = state.logs[dayKey].setLogs[exId];
      const lastKg = sets.length > 0 ? sets[sets.length - 1].kg : 0;
      state.logs[dayKey].setLogs[exId].push({ kg: lastKg, reps: '', done: false });
      ss(state); renderToday();
    }

    function toggleSetDone(dayKey, exId, stype, setIdx) {
      const state = gs();
      if (!state.logs || !state.logs[dayKey] || !state.logs[dayKey].setLogs || !state.logs[dayKey].setLogs[exId]) return;
      state.logs[dayKey].setLogs[exId][setIdx].done = !state.logs[dayKey].setLogs[exId][setIdx].done;
      const sets = state.logs[dayKey].setLogs[exId];
      const doneSets = sets.filter(s => s.done && s.kg);
      if (doneSets.length > 0) state.logs[dayKey].weights[exId] = doneSets[doneSets.length - 1].kg;
      ss(state); renderToday();
    }

    function updateOrmDisplay(exId, state, dayKey) {
      const el = document.getElementById('orm-' + exId); if (!el) return;
      const sets = (state.logs[dayKey]?.setLogs?.[exId] || []).filter(s => s.done && s.kg && s.reps);
      if (!sets.length) { el.style.display = 'none'; return }
      const orms = sets.map(s => calc1RM(s.kg, parseInt(s.reps)));
      const best = Math.max(...orms.filter(Boolean));
      if (best) { el.textContent = '1RM est. ' + best + 'kg'; el.style.display = 'inline-block' }
    }

    function toggleSetsPanel(exId) { const p = document.getElementById('sets-panel-' + exId); if (!p) return; p.style.display = p.style.display === 'block' ? 'none' : 'block' }
    function toggleWarmup(exId) { const p = document.getElementById('warmup-' + exId); if (!p) return; p.style.display = p.style.display === 'block' ? 'none' : 'block' }
    function toggleAlts(exId) { const panel = document.getElementById('alts-' + exId); if (!panel) return; panel.style.display = panel.style.display === 'block' ? 'none' : 'block' }

    function useAlt(dayKey, exId, stype, altName, altSets, altDefaultKg) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      const log = state.logs[dayKey]; if (!log.swaps) log.swaps = {};
      log.swaps[exId] = { name: altName, sets: altSets, kg: altDefaultKg };
      ss(state); renderToday();
    }
    function clearSwap(dayKey, exId) { const state = gs(); if (state.logs && state.logs[dayKey] && state.logs[dayKey].swaps) { delete state.logs[dayKey].swaps[exId]; ss(state); renderToday() } }

    function renderToday() {
      updateSidebar();
      const state = gs();
      const todayKey = today();
      const stype = getTodaySession();

      const session = PROG.sessions[stype];

      // Timer
      html += `<div class="timer-widget">

      for (const group of session.groups) {

            warmupSets.forEach(w => { warmupHtml += `<div class="warmup-row"><span class="warmup-dot"></span><span>${w.pct}% → ${w.kg}kg × ${w.reps} reps</span></div>` });
            warmupHtml += `</div></div>`;
          }

          // Tip progressione
          let progTip = '';
          if (ex.note) {
            progTip = `<div class="prog-tip">${ex.note}</div>`;
          }

          const curSets = initSetLog(state, todayKey, ex.id, stype, dispKg, dispSets.split('×')[0]);
          ss(state);
          let setLogHtml = `<div class="setlog-area" id="sets-panel-${ex.id}" style="display:none">
      <div class="setlog-title">Serie dettagliate · doppia progressione</div>

        <button class="setlog-done ${s.done ? 'ok' : ''}" onclick="toggleSetDone('${todayKey}','${ex.id}','${stype}',${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>

          });
          setLogHtml += `</div><button class="setlog-add" onclick="addSet('${todayKey}','${ex.id}','${stype}')">+ Serie</button></div>`;

        </button>

          <div class="ex-name">${dispName}${swap ? ` <span style="font-size:10px;color:var(--acc);margin-left:4px;">↻</span>` : ''}</div>

        <div class="ex-right">

            <span class="kg-unit">kg</span>

      <div class="ex-actions">

          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Serie
        </button>
        ${warmupSets.length > 0 ? `<button class="toggle-sets-btn" onclick="toggleWarmup('${ex.id}')">☀ Warm-up</button>` : ''}
        <button class="swap-btn" onclick="toggleAlts('${ex.id}')">
          <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>

    function setTodaySession(stype) {
      const state = gs(); const todayKey = today();
      if (!state.logs) state.logs = {};
      if (!state.logs[todayKey]) state.logs[todayKey] = { date: todayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      state.logs[todayKey].type = stype; ss(state); renderToday();
    }

    function getPrevKg(state, stype, exId, skipDate) {
      const logs = Object.values(state.logs || {}).filter(l => l.type === stype && l.date !== skipDate && l.weights && l.weights[exId] !== undefined).sort((a, b) => b.date > a.date ? 1 : -1);
      return logs.length > 0 ? logs[0].weights[exId] : null;
    }
    function toggleEx(dayKey, exId, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      const log = state.logs[dayKey]; if (!log.checked) log.checked = {};
      log.checked[exId] = !log.checked[exId]; ss(state); renderToday();
    }
    function saveKg(dayKey, exId, val, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      const log = state.logs[dayKey]; if (!log.weights) log.weights = {};
      log.weights[exId] = parseFloat(val) || 0; ss(state);
    }
    function markDone(dayKey, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {}, setLogs: {} };
      state.logs[dayKey].done = true; ss(state); renderToday();
    }

    let progFilter = 'push';
    let expandedEx = null;
    function renderProgress(f) {
      if (f) progFilter = f;
      const state = gs();
      const session = PROG.sessions[progFilter];
      const allLogs = Object.values(state.logs || {}).filter(l => l.type === progFilter).sort((a, b) => a.date > b.date ? 1 : -1);
      const allEx = session.groups.flatMap(g => g.exercises);
      const color = PROG.colors[progFilter];
      const container = document.getElementById('view-progress');
      let html = `<div class="section-header"><div class="section-title">Progressi</div><div class="prog-filter">${['push', 'pull', 'legs'].map(t => `<button class="pf-btn ${progFilter === t ? 'active' : ''}" onclick="renderProgress('${t}')">${PROG.sessions[t].label}</button>`).join('')}</div></div>`;
      html += `<div class="chart-expanded ${expandedEx ? 'open' : ''}" id="chart-expanded">`;
      if (expandedEx) {
        const ex = allEx.find(e => e.id === expandedEx);
        if (ex) {
          const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined).map(l => ({ d: l.date, v: l.weights[ex.id] }));
          html += `<div class="chart-exp-title">${ex.name}</div><div class="chart-exp-sub">${ex.sets} · ${pts.length} sessioni tracciate</div>`;
          if (pts.length >= 2) {
            html += `<div class="chart-svg-wrap">${bigChart(pts, color)}</div>`;
            html += `<div style="margin-top:14px;overflow-x:auto"><table class="vol-table"><thead><tr><th>Data</th><th>Kg</th><th>1RM est.</th></tr></thead><tbody>`;
            pts.slice().reverse().slice(0, 10).forEach(p => {
              const orm = calc1RM(p.v, 8);
              html += `<tr><td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3)">${fmtDate(p.d)}</td><td class="kg-now">${p.v}kg</td><td style="color:var(--acc);font-size:11px">${orm ? orm + 'kg' : '—'}</td></tr>`;
            });
            html += `</tbody></table></div>`;
          } else { html += `<div class="no-data-spark" style="height:120px">Dati insufficienti per il grafico</div>`; }
          html += `<button onclick="expandedEx=null;renderProgress()" style="margin-top:14px;background:transparent;border:1px solid var(--b1);border-radius:var(--r);color:var(--t3);font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer;">✕ Chiudi</button>`;

      html += `<div class="prog-grid">`;

        const first = pts.length > 0 ? pts[0].v : ex.defaultKg;
        const last = pts.length > 0 ? pts[pts.length - 1].v : ex.defaultKg;
        const delta = last - first;
        const isDeload = checkDeload(state, progFilter, ex.id);
        html += `<div class="prog-card" onclick="expandedEx='${ex.id}';renderProgress()">

    <div class="prog-delta">
      <div><div class="delta-val" style="color:${color}">${last}kg</div><div class="delta-label">ultimo</div></div>
      <div style="text-align:right"><div class="delta-val" style="font-size:14px;color:${delta > 0 ? 'var(--pull)' : delta < 0 ? 'var(--push)' : 'var(--t3)'}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div><div class="delta-label">variazione</div></div>

  </div>`;
      }

        for (const group of session.groups) {

            const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined);
            if (!pts.length) continue;
            const first = pts[0].weights[ex.id], last = pts[pts.length - 1].weights[ex.id], delta = last - first;
            const orm = calc1RM(last, 8);
            const isDeload = checkDeload(state, progFilter, ex.id);
            html += `<tr style="cursor:pointer" onclick="expandedEx='${ex.id}';renderProgress()">
        <td><div class="vol-name">${ex.name}${isDeload ? ' <span style="color:var(--legs);font-size:10px">⚠</span>' : ''}</div>${ex.note ? `<div class="vol-sub">${ex.note}</div>` : ''}</td>
        <td><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)">${ex.sets}</span></td>
        <td class="kg-was">${first}kg</td>

        <td class="${delta > 0 ? 'kg-up' : delta < 0 ? 'kg-down' : 'kg-same'}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</td>
        <td style="color:var(--acc);font-size:11px">${orm ? orm + 'kg' : '—'}</td>
        <td style="color:var(--t3)">${pts.length}</td>
      </tr>`;
          }

      }
      container.innerHTML = html;
    }

    function sparkline(pts, color) {
      const vals = pts.map(p => p.v);
      const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
      const W = 300, H = 65, P = 4;
      const points = pts.map((p, i) => `${(P + i * (W - P * 2) / (pts.length - 1)).toFixed(1)},${(H - P - (p.v - min) / range * (H - P * 2)).toFixed(1)}`).join(' ');
      const lastX = P + (pts.length - 1) * (W - P * 2) / (pts.length - 1);
      const lastY = H - P - (pts[pts.length - 1].v - min) / range * (H - P * 2);
      return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
  <polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"/>
  <polygon fill="${color}" fill-opacity="0.07" points="${P},${H} ${points} ${lastX.toFixed(1)},${H}"/>
  <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="${color}"/>
</svg>`;
    }

    function bigChart(pts, color) {
      const vals = pts.map(p => p.v);
      const min = Math.min(...vals) - 2, max = Math.max(...vals) + 2, range = max - min || 1;
      const W = 600, H = 160, PX = 40, PY = 12;
      const iW = W - PX * 2, iH = H - PY * 2;
      const x = i => PX + i * (iW / (pts.length - 1));
      const y = v => PY + iH - (v - min) / range * iH;
      const points = pts.map((p, i) => `${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(' ');
      const yLabels = [min, min + range / 2, max].map(v => ({ v: Math.round(v * 10) / 10, y: y(v) }));
      let yHtml = ''; yLabels.forEach(l => { yHtml += `<text x="${PX - 4}" y="${l.y.toFixed(1)}" text-anchor="end" fill="var(--t3)" font-family="JetBrains Mono,monospace" font-size="9">${l.v}</text>` });
      let xHtml = '';
      const step = Math.ceil(pts.length / 5);
      pts.forEach((p, i) => { if (i % step === 0 || i === pts.length - 1) { xHtml += `<text x="${x(i).toFixed(1)}" y="${H - 1}" text-anchor="middle" fill="var(--t3)" font-family="JetBrains Mono,monospace" font-size="9">${p.d.slice(5)}</text>` } });
      let dots = ''; pts.forEach((p, i) => { dots += `<circle cx="${x(i).toFixed(1)}" cy="${y(p.v).toFixed(1)}" r="3.5" fill="${color}" opacity="0.8"><title>${p.d}: ${p.v}kg</title></circle>` });
      return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="min-width:400px">
  <line x1="${PX}" y1="${PY}" x2="${PX}" y2="${PY + iH}" stroke="var(--b1)" stroke-width="1"/>
  <line x1="${PX}" y1="${PY + iH}" x2="${PX + iW}" y2="${PY + iH}" stroke="var(--b1)" stroke-width="1"/>
  ${yHtml}${xHtml}
  <polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"/>
  <polygon fill="${color}" fill-opacity="0.06" points="${PX},${PY + iH} ${points} ${x(pts.length - 1).toFixed(1)},${PY + iH}"/>
  ${dots}
</svg>`;
    }

    function renderHistory() {
      const state = gs();
      const logs = Object.values(state.logs || {}).sort((a, b) => b.date > a.date ? 1 : -1);
      const container = document.getElementById('view-history');
      let html = `<div class="section-header"><div class="section-title">Storico</div>${logs.length > 0 ? `<button class="clear-btn" onclick="clearAll()">Cancella tutto</button>` : ''}</div>`;
      if (!logs.length) { html += `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nessuna sessione ancora</div><div class="empty-sub">Le sessioni completate appariranno qui</div></div>`; container.innerHTML = html; return }
      html += `<div class="hist-list">`;
      for (const log of logs) {
        if (!log.type || !PROG.sessions[log.type]) continue;
        const sess = PROG.sessions[log.type];
        const allEx = sess.groups.flatMap(g => g.exercises);
        const cc = Object.values(log.checked || {}).filter(Boolean).length;
        const swapCount = Object.keys(log.swaps || {}).length;
        let totalVol = 0;
        if (log.setLogs) { Object.values(log.setLogs).forEach(sets => { sets.filter(s => s.done && s.kg && s.reps).forEach(s => { totalVol += s.kg * parseInt(s.reps) || 0 }) }) }
        html += `<div class="hist-item">
    <span class="hist-dot" style="background:${PROG.colors[log.type]}"></span>
    <div>
      <div class="hist-name">${sess.label}${swapCount > 0 ? ` <span style="font-size:10px;color:var(--acc);margin-left:4px">${swapCount} sost.</span>` : ''}</div>
      <div class="hist-date">${fmtDate(log.date)}${totalVol > 0 ? ` · <span style="color:var(--t2)">${totalVol.toLocaleString('it-IT')}kg vol.</span>` : ''}</div>
    </div>
    <div>
      <div class="hist-count">${cc}/${allEx.length}</div>
      ${log.done ? '<div class="hist-done-tag">✓ COMPLETA</div>' : ''}
    </div>
  </div>`;
      }
      html += `</div>`;
      container.innerHTML = html;
    }

    function clearAll() { if (confirm('Cancellare tutto lo storico? Operazione irreversibile.')) { localStorage.removeItem('ppl_v8'); renderHistory(); updateSidebar() } }

    function renderBodyweight() {
      const state = gs();
      const bwLog = state.bwLog || {};
      const container = document.getElementById('view-bodyweight');
      const entries = Object.entries(bwLog).sort((a, b) => a[0] > b[0] ? 1 : -1);
      const latestEntry = entries.length > 0 ? entries[entries.length - 1] : null;
      let html = `<div class="page-header"><div class="page-title">Peso corporeo</div><div class="page-sub">Obiettivo: 65-67 kg · composizione, non solo peso</div></div>`;
      html += `<div style="background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:18px 20px;margin-bottom:20px">
  <div style="font-size:12px;font-weight:700;margin-bottom:12px">Misurazione di oggi</div>
  <div class="bw-row">
    <input type="number" class="bw-input" id="bw-new" value="${latestEntry ? latestEntry[1] : ''}" min="30" max="200" step="0.1" placeholder="kg" onkeydown="if(event.key==='Enter')saveBW()">
    <span class="bw-label">kg</span>
    <button class="bw-save" onclick="saveBW()">Salva oggi</button>
  </div>
  ${latestEntry ? `<div style="font-size:11px;color:var(--t3);margin-top:4px">Ultima: ${fmtDate(latestEntry[0])} — ${latestEntry[1]} kg</div>` : ''}
  <div style="margin-top:12px;background:var(--bg3);border-radius:var(--r);padding:10px 12px;font-size:11px;color:var(--t2);">
    Zona target: <b style="color:var(--pull)">65–67 kg</b> · Se sale oltre 68 kg taglia 100-200 kcal · Se scende sotto 65 aumenta leggermente · Proteine: min <b style="color:var(--pull)">110g/giorno</b>
  </div>
</div>`;
      if (entries.length >= 2) {
        const pts = entries.map(([d, v]) => ({ d, v }));
        const first = pts[0].v, last = pts[pts.length - 1].v, delta = last - first;
        html += `<div class="bw-chart-wrap">
    <div class="bw-chart-title">Trend peso corporeo</div>
    <div class="chart-svg-wrap">${bigChart(pts, '#7c6ef5')}</div>
    <div class="prog-delta" style="margin-top:14px">
      <div><div class="delta-val" style="color:var(--acc)">${last}kg</div><div class="delta-label">attuale</div></div>
      <div style="text-align:right"><div class="delta-val" style="font-size:14px;color:${delta < 0 ? 'var(--pull)' : delta > 0 ? 'var(--push)' : 'var(--t3)'}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div><div class="delta-label">variazione</div></div>
    </div>
  </div>`;
      }
      if (entries.length > 0) {
        html += `<div style="margin-top:20px;margin-bottom:10px;font-size:14px;font-weight:700">Storico misurazioni</div>`;
        html += `<table class="vol-table"><thead><tr><th>Data</th><th>Peso</th><th>Δ</th></tr></thead><tbody>`;
        entries.slice().reverse().slice(0, 20).forEach(([d, v], i, arr) => {
          const prev = arr[i + 1] ? arr[i + 1][1] : null;
          const delta = prev !== null ? v - prev : null;
          html += `<tr><td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3)">${fmtDate(d)}</td><td class="kg-now">${v}kg</td><td class="${delta === null ? 'kg-same' : delta < 0 ? 'kg-up' : delta > 0 ? 'kg-down' : 'kg-same'}">${delta === null ? '—' : (delta > 0 ? '+' : '') + delta.toFixed(1) + 'kg'}</td></tr>`;
        });
        html += `</tbody></table>`;
      } else {
        html += `<div class="empty"><div class="empty-icon">⚖</div><div class="empty-text">Nessuna misurazione ancora</div><div class="empty-sub">Inserisci il tuo peso sopra ogni mattina a digiuno</div></div>`;
      }
      container.innerHTML = html;
    }

    function saveBW() {
      const input = document.getElementById('bw-new'); if (!input) return;
      const val = parseFloat(input.value); if (!val || val < 30 || val > 300) { input.style.borderColor = 'var(--push)'; setTimeout(() => input.style.borderColor = '', 1500); return }
      const state = gs(); if (!state.bwLog) state.bwLog = {};
      state.bwLog[today()] = val; ss(state); renderBodyweight();
    }

    function exportData() {
      const state = gs();
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'ppl-backup-' + today() + '.json'; a.click(); URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input'); input.type = 'file'; input.accept = '.json,application/json';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data && typeof data === 'object') {
              if (confirm('Importare il backup? I dati attuali verranno sovrascritti.')) {
                localStorage.setItem('ppl_v8', JSON.stringify(data));
                renderToday(); updateSidebar();
                alert('Import completato ✓');
              }
            } else { alert('File non valido') }
          } catch (err) { alert('Errore nel file: ' + err.message) }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function logout() {
      localStorage.removeItem('ppl_auth');
      document.getElementById('pin-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      setTimeout(() => { const i = document.getElementById('pin-input'); if (i) { i.value = ''; i.focus() } }, 100);
    }

    const CORRECT_PIN = '3520'; // ← cambia il PIN qui
    function checkPin() {
      const input = document.getElementById('pin-input'); const err = document.getElementById('pin-err'); if (!input) return;
      if (input.value === CORRECT_PIN) {
        localStorage.setItem('ppl_auth', '1');
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        renderToday();
      } else {
        err.textContent = 'PIN errato — riprova'; input.value = ''; input.focus();
        input.style.borderColor = 'var(--push)'; setTimeout(() => { input.style.borderColor = ''; err.textContent = '' }, 1500);
      }
    }

    (function init() {
      const authed = localStorage.getItem('ppl_auth') === '1';
      if (authed) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        renderToday();
      } else {
        document.getElementById('pin-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
        setTimeout(() => { const i = document.getElementById('pin-input'); if (i) i.focus() }, 100);
      }
    })();
  </script>
</body>

</html>
