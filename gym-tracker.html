<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PPL Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --bg2: #111;
      --bg3: #191919;
      --bg4: #222;
      --bg5: #2a2a2a;
      --b1: #252525;
      --b2: #353535;
      --b3: #484848;
      --t1: #f0ede6;
      --t2: #9e9b94;
      --t3: #555250;
      --t4: #333;
      --push: #ff5c35;
      --pull: #2dcc7a;
      --legs: #f5a623;
      --acc: #7c6ef5;
      --r: 8px;
      --rl: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar {
      width: 3px;
      height: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--b2);
      border-radius: 2px;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    button {
      font-family: 'Syne', sans-serif;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    .topbar {
      display: none;
      background: var(--bg2);
      border-bottom: 1px solid var(--b1);
      padding: 14px 16px;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .topbar-logo span {
      color: var(--acc);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-streak {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--t2);
    }

    .shell {
      display: grid;
      grid-template-columns: 200px 1fr;
      flex: 1;
    }

    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sb-logo {
      padding: 22px 18px 18px;
      border-bottom: 1px solid var(--b1);
    }

    .sb-logo-text {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .sb-logo-text span {
      color: var(--acc);
    }

    .sb-logo-sub {
      font-size: 10px;
      color: var(--t3);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 3px;
      font-family: 'JetBrains Mono', monospace;
    }

    .sb-stats {
      padding: 14px 18px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .sb-stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .sb-stat-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    .sb-stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
    }

    .sb-week {
      padding: 14px 18px;
      border-bottom: 1px solid var(--b1);
    }

    .sb-section-title {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 9px;
    }

    .week-days {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .wd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: var(--r);
      border: 1px solid transparent;
      transition: all .15s;
    }

    .wd.today {
      background: var(--bg3);
      border-color: var(--b2);
    }

    .wd-name {
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      width: 28px;
    }

    .wd-type {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em;
    }

    .wd-done {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--pull);
      opacity: 0;
      transition: opacity .2s;
    }

    .wd.done .wd-done {
      opacity: 1;
    }

    .type-push {
      color: var(--push);
    }

    .type-pull {
      color: var(--pull);
    }

    .type-legs {
      color: var(--legs);
    }

    .type-rest {
      color: var(--t4);
    }

    .sb-nav {
      padding: 14px 18px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 9px;
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s;
      color: var(--t3);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--t2);
    }

    .nav-item.active {
      background: var(--bg4);
      color: var(--t1);
      border-color: var(--b2);
    }

    .nav-icon {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: .5;
    }

    .nav-item.active .nav-icon {
      opacity: 1;
    }

    .sb-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--b1);
    }

    .sb-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--t3);
    }

    .main {
      overflow-y: auto;
      min-width: 0;
    }

    .main-inner {
      padding: 28px 32px 80px;
      max-width: 840px;
    }

    .bottom-nav {
      display: none;
      background: var(--bg2);
      border-top: 1px solid var(--b1);
      grid-template-columns: repeat(3, 1fr);
      position: sticky;
      bottom: 0;
      z-index: 100;
    }

    .bn-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      cursor: pointer;
      color: var(--t3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: color .15s;
    }

    .bn-item svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bn-item.active {
      color: var(--t1);
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1.1;
    }

    .page-sub {
      font-size: 12px;
      color: var(--t2);
      margin-top: 5px;
    }

    .session-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .ss-btn {
      padding: 9px 18px;
      border-radius: 99px;
      border: 1px solid var(--b1);
      background: transparent;
      color: var(--t3);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .18s;
      text-transform: uppercase;
    }

    .ss-btn:hover {
      background: var(--bg3);
      border-color: var(--b2);
    }

    .ss-btn.active-push {
      background: rgba(255, 92, 53, .12);
      border-color: rgba(255, 92, 53, .4);
      color: var(--push);
    }

    .ss-btn.active-pull {
      background: rgba(45, 204, 122, .12);
      border-color: rgba(45, 204, 122, .4);
      color: var(--pull);
    }

    .ss-btn.active-legs {
      background: rgba(245, 166, 35, .12);
      border-color: rgba(245, 166, 35, .4);
      color: var(--legs);
    }

    .session-type-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .stype-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 11px;
      border-radius: 99px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .badge-push {
      background: rgba(255, 92, 53, .12);
      color: var(--push);
    }

    .badge-pull {
      background: rgba(45, 204, 122, .12);
      color: var(--pull);
    }

    .badge-legs {
      background: rgba(245, 166, 35, .12);
      color: var(--legs);
    }

    .stype-name {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
      min-width: 120px;
    }

    .stype-right {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
    }

    .progress-ring-wrap {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .progress-ring-wrap svg {
      transform: rotate(-90deg);
    }

    .pr-bg {
      fill: none;
      stroke: var(--b1);
      stroke-width: 3;
    }

    .pr-fg {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset .4s ease;
    }

    .pr-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
    }

    .timer-widget {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 16px 20px;
      margin-bottom: 18px;
    }

    .timer-top {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .timer-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }

    .timer-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -.02em;
      min-width: 80px;
    }

    .timer-display.running {
      color: var(--pull);
    }

    .timer-display.paused {
      color: var(--legs);
    }

    .timer-controls {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tbtn {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 7px 12px;
      color: var(--t1);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .04em;
    }

    .tbtn:hover {
      background: var(--bg4);
      border-color: var(--b2);
    }

    .tbtn.tstart {
      background: rgba(45, 204, 122, .1);
      border-color: rgba(45, 204, 122, .25);
      color: var(--pull);
    }

    .tbtn.tstop {
      background: rgba(255, 92, 53, .08);
      border-color: rgba(255, 92, 53, .25);
      color: var(--push);
    }

    .timer-presets {
      display: flex;
      gap: 5px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .preset {
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 5px 9px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .preset:hover {
      background: var(--bg3);
      color: var(--t2);
      border-color: var(--b2);
    }

    .ex-group {
      margin-bottom: 18px;
    }

    .ex-group-label {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 7px;
      padding-left: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ex-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--b1);
    }

    .ex-card {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color .2s;
    }

    .ex-card:hover {
      border-color: var(--b2);
    }

    .ex-card.done {
      opacity: .5;
    }

    .ex-card.done .ex-name {
      text-decoration: line-through;
      text-decoration-color: var(--t3);
    }

    .ex-main {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
    }

    .ex-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--b2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .18s;
      flex-shrink: 0;
      color: transparent;
    }

    .ex-check:hover {
      border-color: var(--b3);
      background: var(--bg3);
    }

    .ex-check.checked {
      background: var(--pull);
      border-color: var(--pull);
      color: #000;
    }

    .ex-check svg {
      width: 11px;
      height: 11px;
    }

    .ex-body {
      min-width: 0;
    }

    .ex-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ex-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .ex-sets {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--t2);
    }

    .ex-note-inline {
      font-size: 11px;
      color: var(--t3);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }

    .ex-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .ex-kg-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .ex-kg {
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      width: 62px;
      padding: 6px 8px;
      text-align: center;
      outline: none;
      transition: border-color .15s;
    }

    .ex-kg:focus {
      border-color: var(--b3);
      background: var(--bg4);
    }

    .kg-unit {
      font-size: 10px;
      color: var(--t3);
      font-family: 'JetBrains Mono', monospace;
    }

    .ex-trend {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--t3);
    }

    .trend-up {
      color: var(--pull);
    }

    .trend-down {
      color: var(--push);
    }

    .ex-actions {
      padding: 0 14px 11px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swap-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 5px 10px;
      color: var(--t3);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .03em;
    }

    .swap-btn:hover {
      background: var(--bg3);
      border-color: var(--b2);
      color: var(--t2);
    }

    .swap-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .alts-panel {
      background: var(--bg3);
      border-top: 1px solid var(--b1);
      padding: 12px 14px;
    }

    .alts-title {
      font-size: 10px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }

    .alt-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .alt-opt {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s;
      gap: 10px;
    }

    .alt-opt:hover {
      border-color: var(--b2);
      background: var(--bg4);
    }

    .alt-opt-info {
      min-width: 0;
    }

    .alt-opt-name {
      font-size: 12px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .alt-opt-meta {
      font-size: 10px;
      color: var(--t3);
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    .use-btn {
      background: var(--acc);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
      letter-spacing: .03em;
    }

    .use-btn:hover {
      opacity: .85;
    }

    .alts-close {
      font-size: 11px;
      color: var(--t3);
      cursor: pointer;
      margin-top: 8px;
      display: inline-block;
    }

    .alts-close:hover {
      color: var(--t2);
    }

    .cardio-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--t2);
    }

    .cardio-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--acc);
      flex-shrink: 0;
    }

    .complete-zone {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .complete-btn {
      background: var(--pull);
      color: #000;
      border: none;
      border-radius: var(--r);
      padding: 11px 22px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .02em;
    }

    .complete-btn:hover {
      filter: brightness(1.1);
    }

    .complete-btn:active {
      transform: scale(.97);
    }

    .completed-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--pull);
      font-size: 13px;
      font-weight: 600;
    }

    .complete-hint {
      font-size: 11px;
      color: var(--t3);
    }

    .rest-card {
      background: var(--bg2);
      border: 1px solid var(--b1);
      border-radius: var(--rl);
      padding: 48px 32px;
      text-align: center;
    }

    .rest-icon {
      font-size: 36px;
      margin-bottom: 14px;
    }

    .rest-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .rest-sub {
      color: var(--t2);
      font-size: 13px;
    }

    .rest-tip {
      margin-top: 20px;
      background: var(--bg3);
      border: 1px solid var(--b1);
      border-radius: var(--r);
      padding: 14px;
      font-size: 12px;
      color: var(--t2);
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    .sched-pick {
      margin-top: 20px;
    }

    .sched-pick-title {
      font-size: 12px;
      color: var(--t2);
      margin-bottom: 12px;
    }

    .sched-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sched-btn {
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--b1);
      background: transparent;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .sched-btn:hover {
      background: var(--bg3);
    }

    .sched-btn-push {
      color: var(--push);
    }

    .sched-btn-pull {
      color: var(--pull);
    }

    .sched-btn-legs {
      color: var(--legs);
    }

    .prog-filter {
      display: flex;
      gap: 7px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .pf-btn {
      padding: 6px 14px;

    function pauseTimer() { clearInterval(timerInt); timerRunning = false; updateTimerDisplay(); }
    function resetTimer(preset) { clearInterval(timerInt); timerRunning = false; timerSec = preset || 0; timerTotal = timerSec; updateTimerDisplay(); if (preset > 0) startTimer(); }
    function updateTimerDisplay() {
      const el = document.getElementById('timer-display');
      if (!el) return;
      const m = Math.floor(timerSec / 60), s = timerSec % 60;
      el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      el.className = 'timer-display' + (timerRunning ? ' running' : timerSec > 0 ? ' paused' : '');
    }
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.15, 0.3].forEach(t => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = 880; g.gain.setValueAtTime(0.3, ctx.currentTime + t);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
          o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.12);
        });
      } catch (e) { }
    }

    let currentView = 'today';
    function nav(v) {
      currentView = v;
      ['today', 'progress', 'history'].forEach(x => {
        const el = document.getElementById('view-' + x);
        el.style.display = x === v ? 'block' : 'none';
        if (x === v) { el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }
      });
      document.querySelectorAll('.nav-item').forEach((el, i) => { el.classList.toggle('active', ['today', 'progress', 'history'][i] === v); });
      ['today', 'progress', 'history'].forEach(x => { const b = document.getElementById('bn-' + x); if (b) b.classList.toggle('active', x === v); });
      if (v === 'today') renderToday();
      if (v === 'progress') renderProgress('push');
      if (v === 'history') renderHistory();
    }

    function updateSidebar() {
      const state = gs(), logs = state.logs || {}, ws = weekStart(), all = Object.values(logs);
      const total = all.length, week = all.filter(l => l.date >= ws).length, streak = calcStreak(state);
      const els = ['sb-total', 'sb-week-count', 'sb-streak'];
      [total, week, streak].forEach((v, i) => { const e = document.getElementById(els[i]); if (e) e.textContent = v; });
      const mob = document.getElementById('mob-streak'); if (mob) mob.textContent = streak + ' 🔥';
      const now = new Date();
      const sbDay = document.getElementById('sb-dayname'); if (sbDay) sbDay.textContent = now.toLocaleDateString('it-IT', { weekday: 'long' });
      const sbFull = document.getElementById('sb-fulldate'); if (sbFull) sbFull.textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });

      const todayIdx = dayOfWeek();
      const todaySession = getTodaySession();
      let whtml = '';
      for (let i = 0; i < 7; i++) {
        const dkey = dateOffset(i - todayIdx);
        const isDone = logs[dkey] && logs[dkey].done;
        const stype = getScheduledType(i, state);
        whtml += `<div class="wd ${i === todayIdx ? 'today' : ''} ${isDone ? 'done' : ''}">
      <span class="wd-name">${DAYS[i]}</span>
      <span class="wd-type type-${stype}">${stype === 'rest' ? '—' : stype.toUpperCase()}</span>
      <span class="wd-done"></span>
    </div>`;
      }
      const wdEl = document.getElementById('week-days'); if (wdEl) wdEl.innerHTML = whtml;
    }

    function calcStreak(state) {
      const logs = state.logs || {};
      let streak = 0;
      for (let i = 0; i < 60; i++) {
        const d = dateOffset(-i);
        if (logs[d] && logs[d].done) streak++;
        else if (i > 0) break;
      }
      return streak;
    }

    const WEEKEND_PUSH = ['push', 'push']; 
    const BASE_WEEK = ['pull', 'rest', 'legs', 'rest', 'pull', 'push', 'push'];

    function getDefaultForDay(dayIdx) {
      return BASE_WEEK[dayIdx] || 'rest';
    }

    function getScheduledType(dayIdx, state) {
      const dkey = dateOffset(dayIdx - dayOfWeek());
      const log = (state.logs || {})[dkey];
      if (log && log.type) return log.type;
      return getDefaultForDay(dayIdx);
    }

    function getTodaySession() {
      const state = gs();
      const log = (state.logs || {})[today()];
      if (log && log.type) return log.type;
      return getDefaultForDay(dayOfWeek());
    }

    function toggleAlts(exId) {
      const panel = document.getElementById('alts-' + exId);
      if (!panel) return;
      const isOpen = panel.style.display === 'block';
      panel.style.display = isOpen ? 'none' : 'block';
    }

    function useAlt(dayKey, exId, stype, altName, altSets, altDefaultKg) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {} };
      const log = state.logs[dayKey];
      if (!log.swaps) log.swaps = {};
      log.swaps[exId] = { name: altName, sets: altSets, kg: altDefaultKg };
      ss(state); renderToday();
    }

    function clearSwap(dayKey, exId) {
      const state = gs();
      if (state.logs && state.logs[dayKey] && state.logs[dayKey].swaps) {
        delete state.logs[dayKey].swaps[exId];
        ss(state); renderToday();
      }
    }

    function renderToday() {
      updateSidebar();
      const state = gs();
      const todayKey = today();
      const dayIdx = dayOfWeek();
      const stype = getTodaySession();
      const container = document.getElementById('view-today');

      const now = new Date();
      const dateStr = now.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });

      let html = `<div class="page-header">
    <div class="page-title">Allenamento di oggi</div>
    <div class="page-sub">${dateStr}</div>
  </div>`;

      html += `<div class="session-selector">
    <span style="font-size:12px;color:var(--t3);align-self:center;margin-right:4px;">Sessione:</span>
    ${['push', 'pull', 'legs'].map(t => `<button class="ss-btn ${stype === t ? 'active-' + t : ''}" onclick="setTodaySession('${t}')">${PROG.sessions[t].label}</button>`).join('')}
  </div>`;

      if (stype === 'rest') {
        html += `<div class="rest-card">
      <div class="rest-icon">🌙</div>
      <div class="rest-title">Giorno di riposo</div>
      <div class="rest-sub">Schema giorno sì / giorno no — recupero attivo</div>
      <div class="rest-tip">Stretching 10 min · Camminata leggera · 8h di sonno<br>Premi un pulsante sopra se vuoi comunque allenarti oggi</div>
    </div>`;
        container.innerHTML = html; return;
      }

      const session = PROG.sessions[stype];
      const todayLog = (state.logs && state.logs[todayKey]) || {};
      const weights = todayLog.weights || {};
      const checked = todayLog.checked || {};
      const swaps = todayLog.swaps || {};
      const isDone = todayLog.done || false;
      const allExIds = session.groups.flatMap(g => g.exercises.map(e => e.id));
      const checkedCount = allExIds.filter(id => checked[id]).length;
      const pct = allExIds.length > 0 ? Math.round(checkedCount / allExIds.length * 100) : 0;
      const circ = 2 * Math.PI * 17;
      const offset = circ - (pct / 100) * circ;
      const colorVar = `var(--${session.color})`;


      html += `<div class="timer-widget">
    <div class="timer-top">
      <div>
        <div class="timer-label">Timer recupero</div>
        <div id="timer-display" class="timer-display">00:00</div>
      </div>
      <div class="timer-controls">
        <button class="tbtn tstart" onclick="startTimer()">▶</button>
        <button class="tbtn" onclick="pauseTimer()">⏸</button>
        <button class="tbtn tstop" onclick="resetTimer(0)">■</button>
      </div>
    </div>
    <div class="timer-presets">
      <button class="preset" onclick="resetTimer(60)">1m</button>
      <button class="preset" onclick="resetTimer(90)">90s</button>
      <button class="preset" onclick="resetTimer(120)">2m</button>
      <button class="preset" onclick="resetTimer(180)">3m</button>
    </div>
  </div>`;


      html += `<div class="session-type-bar">
    <span class="stype-badge badge-${stype}">${stype}</span>
    <span class="stype-name">${session.label}</span>
    <div class="stype-right">
      <span style="font-size:11px;color:var(--t2)">${checkedCount}/${allExIds.length}</span>
      <div class="progress-ring-wrap">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle class="pr-bg" cx="20" cy="20" r="17"/>
          <circle class="pr-fg" cx="20" cy="20" r="17" stroke="${colorVar}"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
        </svg>
        <div class="pr-label" style="color:${colorVar}">${pct}%</div>
      </div>
    </div>
  </div>`;

      for (const group of session.groups) {
        html += `<div class="ex-group"><div class="ex-group-label">${group.label}</div>`;
        for (const ex of group.exercises) {
          const isChecked = !!checked[ex.id];
          const swap = swaps[ex.id];
          const dispName = swap ? swap.name : ex.name;
          const dispSets = swap ? swap.sets : ex.sets;
          const dispKg = weights[ex.id] !== undefined ? weights[ex.id] : (swap ? swap.kg : ex.defaultKg);
          const prev = getPrevKg(state, stype, ex.id, todayKey);
          const trend = prev !== null ? (dispKg - prev) : null;
          let trendHtml = '';
          if (trend !== null && trend !== 0) trendHtml = `<span class="ex-trend ${trend > 0 ? 'trend-up' : 'trend-down'}">${trend > 0 ? '+' : ''}${trend.toFixed(1)}kg</span>`;
          else if (prev !== null) trendHtml = `<span class="ex-trend">=${prev}kg</span>`;

          html += `<div class="ex-card ${isChecked ? 'done' : ''}" id="excard-${ex.id}">
        <div class="ex-main">
          <button class="ex-check ${isChecked ? 'checked' : ''}" onclick="toggleEx('${todayKey}','${ex.id}','${stype}')" aria-label="completato">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          <div class="ex-body">
            <div class="ex-name">${dispName}${swap ? ` <span style="font-size:10px;color:var(--acc);margin-left:4px;">↻</span>` : ''}
            </div>
            <div class="ex-meta">
              <span class="ex-sets">${dispSets}</span>
              <span class="ex-note-inline">${ex.note ? '— ' + ex.note : ''}</span>
            </div>
          </div>
          <div class="ex-right">
            <div class="ex-kg-wrap">
              <input type="number" class="ex-kg" value="${dispKg}" min="0" step="0.5"
                onchange="saveKg('${todayKey}','${ex.id}',this.value,'${stype}')" onfocus="this.select()">
              <span class="kg-unit">kg</span>
            </div>
            ${trendHtml}
          </div>
        </div>
        <div class="ex-actions">
          <button class="swap-btn" onclick="toggleAlts('${ex.id}')">
            <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            ${swap ? 'Cambia ancora' : 'Macchina occupata?'}
          </button>
          ${swap ? `<button class="swap-btn" onclick="clearSwap('${todayKey}','${ex.id}')" style="color:var(--push)">✕ Ripristina originale</button>` : ''}
        </div>
        <div class="alts-panel" id="alts-${ex.id}" style="display:none">
          <div class="alts-title">Scegli un'alternativa</div>
          <div class="alt-options">`;
          for (const alt of ex.alts) {
            const safeAltName = alt.name.replace(/'/g, "\\'");
            const safeAltNote = alt.note.replace(/'/g, "\\'");
            html += `<div class="alt-opt">
          <div class="alt-opt-info">
            <div class="alt-opt-name">${alt.name}</div>
            <div class="alt-opt-meta">${alt.sets} · ${alt.note}</div>
          </div>
          <button class="use-btn" onclick="useAlt('${todayKey}','${ex.id}','${stype}','${safeAltName}','${alt.sets}',${dispKg})">Usa</button>
        </div>`;
          }
          html += `</div>
          <span class="alts-close" onclick="toggleAlts('${ex.id}')">✕ Chiudi</span>
        </div>
      </div>`;
        }
        html += `</div>`;
      }

      html += `<div class="cardio-row"><span class="cardio-dot"></span>${session.cardio}</div>`;

      if (!isDone) {
        html += `<div class="complete-zone">
      <button class="complete-btn" onclick="markDone('${todayKey}','${stype}')">Sessione completata ✓</button>
      ${checkedCount < allExIds.length ? `<span class="complete-hint">${allExIds.length - checkedCount} rimasti</span>` : ''}
    </div>`;
      } else {
        html += `<div class="completed-badge">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      Ottimo lavoro — sessione completata
    </div>`;
      }

      container.innerHTML = html;
      updateTimerDisplay();
    }

    function setTodaySession(stype) {
      const state = gs();
      const todayKey = today();
      if (!state.logs) state.logs = {};
      if (!state.logs[todayKey]) state.logs[todayKey] = { date: todayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {} };
      state.logs[todayKey].type = stype;
      ss(state); renderToday();
    }

    function getPrevKg(state, stype, exId, skipDate) {
      const logs = Object.values(state.logs || {}).filter(l => l.type === stype && l.date !== skipDate && l.weights && l.weights[exId] !== undefined).sort((a, b) => b.date > a.date ? 1 : -1);
      return logs.length > 0 ? logs[0].weights[exId] : null;
    }
    function toggleEx(dayKey, exId, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {} };
      const log = state.logs[dayKey];
      if (!log.checked) log.checked = {};
      log.checked[exId] = !log.checked[exId];
      ss(state); renderToday();
    }
    function saveKg(dayKey, exId, val, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {} };
      const log = state.logs[dayKey];
      if (!log.weights) log.weights = {};
      log.weights[exId] = parseFloat(val) || 0;
      ss(state);
    }
    function markDone(dayKey, stype) {
      const state = gs();
      if (!state.logs) state.logs = {};
      if (!state.logs[dayKey]) state.logs[dayKey] = { date: dayKey, type: stype, weights: {}, checked: {}, done: false, swaps: {} };
      state.logs[dayKey].done = true;
      ss(state); renderToday();
    }


    let progFilter = 'push';
    function renderProgress(f) {
      if (f) progFilter = f;
      const state = gs();
      const session = PROG.sessions[progFilter];
      const allLogs = Object.values(state.logs || {}).filter(l => l.type === progFilter).sort((a, b) => a.date > b.date ? 1 : -1);
      const allEx = session.groups.flatMap(g => g.exercises);
      const color = PROG.colors[progFilter];
      const container = document.getElementById('view-progress');

      let html = `<div class="section-header">
    <div class="section-title">Progressi</div>
    <div class="prog-filter">
      ${['push', 'pull', 'legs'].map(t => `<button class="pf-btn ${progFilter === t ? 'active' : ''}" onclick="renderProgress('${t}')">${PROG.sessions[t].label}</button>`).join('')}
    </div>
  </div>`;

      html += `<div class="prog-grid">`;
      for (const ex of allEx.slice(0, 4)) {
        const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined).map(l => ({ d: l.date, v: l.weights[ex.id] }));
        const first = pts.length > 0 ? pts[0].v : ex.defaultKg;
        const last = pts.length > 0 ? pts[pts.length - 1].v : ex.defaultKg;
        const delta = last - first;
        html += `<div class="prog-card">
      <div class="prog-card-title">${ex.name}</div>
      <div class="prog-card-sub">${ex.sets}</div>
      <div class="chart-wrap">${pts.length >= 2 ? sparkline(pts, color) : `<div class="no-data-spark">Dati insufficienti</div>`}</div>
      <div class="prog-delta">
        <div><div class="delta-val" style="color:${color}">${last}kg</div><div class="delta-label">ultimo</div></div>
        <div style="text-align:right"><div class="delta-val" style="font-size:14px;color:${delta > 0 ? 'var(--pull)' : delta < 0 ? 'var(--push)' : 'var(--t3)'}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</div><div class="delta-label">variazione</div></div>
      </div>
    </div>`;
      }
      html += `</div>`;

      if (allLogs.length === 0) {
        html += `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Nessun dato ancora</div><div class="empty-sub">Completa alcune sessioni ${progFilter.toUpperCase()}</div></div>`;
      } else {
        html += `<div style="margin-bottom:12px;font-size:14px;font-weight:700">Tutti i carichi</div>`;
        html += `<table class="vol-table"><thead><tr><th>Esercizio</th><th>Serie</th><th>Primo</th><th>Ultimo</th><th>Δ</th><th>N</th></tr></thead><tbody>`;
        for (const group of session.groups) {
          for (const ex of group.exercises) {
            const pts = allLogs.filter(l => l.weights && l.weights[ex.id] !== undefined);
            if (!pts.length) continue;
            const first = pts[0].weights[ex.id], last = pts[pts.length - 1].weights[ex.id], delta = last - first;
            html += `<tr>
          <td><div class="vol-name">${ex.name}</div>${ex.note ? `<div class="vol-sub">${ex.note}</div>` : ''}</td>
          <td><span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)">${ex.sets}</span></td>
          <td class="kg-was">${first}kg</td>
          <td class="kg-now">${last}kg</td>
          <td class="${delta > 0 ? 'kg-up' : delta < 0 ? 'kg-down' : 'kg-same'}">${delta > 0 ? '+' : ''}${delta.toFixed(1)}</td>
          <td style="color:var(--t3)">${pts.length}</td>
        </tr>`;
          }
        }
        html += `</tbody></table>`;
      }
      container.innerHTML = html;
    }

    function sparkline(pts, color) {
      const vals = pts.map(p => p.v);
      const min = Math.min(...vals), max = Math.max(...vals), range = max - min || 1;
      const W = 300, H = 65, P = 4;
      const points = pts.map((p, i) => `${(P + i * (W - P * 2) / (pts.length - 1)).toFixed(1)},${(H - P - (p.v - min) / range * (H - P * 2)).toFixed(1)}`).join(' ');
      const lastX = P + (pts.length - 1) * (W - P * 2) / (pts.length - 1);
      const lastY = H - P - (pts[pts.length - 1].v - min) / range * (H - P * 2);
      return `<svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${points}"/>
    <polygon fill="${color}" fill-opacity="0.07" points="${P},${H} ${points} ${lastX.toFixed(1)},${H}"/>
    <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="${color}"/>
  </svg>`;
    }

    function renderHistory() {
      const state = gs();
      const logs = Object.values(state.logs || {}).sort((a, b) => b.date > a.date ? 1 : -1);
      const container = document.getElementById('view-history');
      let html = `<div class="section-header">
    <div class="section-title">Storico</div>
    ${logs.length > 0 ? `<button class="clear-btn" onclick="clearAll()">Cancella tutto</button>` : ''}
  </div>`;
      if (!logs.length) {
        html += `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Nessuna sessione ancora</div><div class="empty-sub">Le sessioni completate appariranno qui</div></div>`;
        container.innerHTML = html; return;
      }
      html += `<div class="hist-list">`;
      for (const log of logs) {
        if (!log.type || !PROG.sessions[log.type]) continue;
        const sess = PROG.sessions[log.type];
        const allEx = sess.groups.flatMap(g => g.exercises);
        const cc = Object.values(log.checked || {}).filter(Boolean).length;
        const swapCount = Object.keys(log.swaps || {}).length;
        html += `<div class="hist-item">
      <span class="hist-dot" style="background:${PROG.colors[log.type]}"></span>
      <div>
        <div class="hist-name">${sess.label}${swapCount > 0 ? ` <span style="font-size:10px;color:var(--acc);margin-left:4px">${swapCount} sost.</span>` : ''}</div>
        <div class="hist-date">${fmtDate(log.date)}</div>
      </div>
      <div>
        <div class="hist-count">${cc}/${allEx.length}</div>
        ${log.done ? '<div class="hist-done-tag">✓ COMPLETA</div>' : ''}
      </div>
    </div>`;
      }
      html += `</div>`;
      container.innerHTML = html;
    }

    function clearAll() {
      if (confirm('Cancellare tutto lo storico? Operazione irreversibile.')) { localStorage.removeItem('ppl_v6'); renderHistory(); updateSidebar(); }
    }
    function logout() {
      localStorage.removeItem('ppl_auth');
      document.getElementById('pin-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      setTimeout(() => { const i = document.getElementById('pin-input'); if (i) { i.value = ''; i.focus(); } }, 100);
    }

    const CORRECT_PIN = '3520';

    function checkPin() {
      const input = document.getElementById('pin-input');
      const err = document.getElementById('pin-err');
      if (!input) return;
      if (input.value === CORRECT_PIN) {
        localStorage.setItem('ppl_auth', '1');
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        renderToday();
      } else {
        err.textContent = 'PIN errato — riprova';
        input.value = '';
        input.focus();
        input.style.borderColor = 'var(--push)';
        setTimeout(() => { input.style.borderColor = ''; err.textContent = ''; }, 1500);
      }
    }

    (function init() {
      const authed = localStorage.getItem('ppl_auth') === '1';
      if (authed) {
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        renderToday();
      } else {
        document.getElementById('pin-screen').style.display = 'flex';
        document.getElementById('main-app').style.display = 'none';
        setTimeout(() => { const i = document.getElementById('pin-input'); if (i) i.focus(); }, 100);
      }
    })();
  </script>
</body>

</html>
